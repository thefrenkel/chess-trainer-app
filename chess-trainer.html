<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="recovered/chess-trainer-recovery-state.js"></script>
<style>
:root {
  --bg:#0f172a;--bg2:#1e293b;--card:rgba(30,41,59,0.84);--inner:#172235;
  --border:#42546b;--border2:#667d98;--text:#f8fafc;--sub:#d2deee;--muted:#b5c5db;
  --accent:#3b82f6;--accent2:#2563eb;--red:#ef4444;--green:#22c55e;--purple:#8b5cf6;--amber:#f59e0b;
}
.light {
  --bg:#f8fafc;--bg2:#ffffff;--card:#ffffff;--inner:#f1f5f9;
  --border:#d9e2ec;--border2:#c3d0dd;--text:#0f172a;--sub:#52657e;--muted:#70839b;
  --accent:#3b82f6;--accent2:#2563eb;--red:#ef4444;--green:#22c55e;--purple:#8b5cf6;--amber:#f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,Helvetica,Arial,sans-serif;line-height:1.5;transition:background .3s,color .3s}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,textarea{font-family:inherit;outline:none}

.max-w{max-width:1100px;margin:0 auto;padding:0 16px}

/* Header */
.header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 0}
.header-inner{display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.title-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.header .sub{font-size:12px;color:var(--sub);margin-top:1px}
.header-btns{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap}
.ver-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;border:1px solid var(--border2);background:var(--inner);color:var(--sub);font-size:10px;font-weight:700;letter-spacing:.04em}
.app-mark{width:38px;height:38px;border-radius:12px;border:1px solid rgba(96,165,250,.22);background:linear-gradient(135deg,rgba(37,99,235,.18),rgba(34,197,94,.14));display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
.app-mark svg{width:23px;height:23px;display:block}
.app-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;border:1px solid rgba(56,189,248,.2);background:rgba(56,189,248,.08);color:#93c5fd;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}

/* Banner */
.banner{position:sticky;top:57px;z-index:40;background:rgba(59,130,246,.07);border-bottom:1px solid rgba(59,130,246,.15);padding:8px 0;display:none}
.banner.show{display:block}
.banner-inner{display:flex;align-items:center;justify-content:space-between}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:#60a5fa;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:16px;transition:background .3s,border-color .3s,box-shadow .3s}
.card-complete{box-shadow:0 0 20px rgba(34,197,94,.08)}
.card-inner{background:var(--inner);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.card-inner:last-child{margin-bottom:0}
.section-hdr{display:flex;align-items:center;gap:8px;margin-bottom:16px;cursor:grab;user-select:none}
.section-hdr:active{cursor:grabbing}
.section-lbl{font-size:12px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.05em}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;font-size:12px;font-weight:600;transition:all .15s;color:#fff}
.btn-blue{background:var(--accent)}.btn-blue:hover{background:var(--accent2)}
.btn-red{background:var(--red)}.btn-red:hover{background:#dc2626}
.btn-ghost{background:var(--border);color:var(--text)}.btn-ghost:hover{filter:brightness(1.15)}
.btn-green{background:rgba(74,222,128,.15);color:#86efac}.btn-green:hover{filter:brightness(1.15)}
.btn-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:var(--border);color:var(--text);transition:all .15s}
.btn-icon:hover{filter:brightness(1.15)}
.sync-pill{display:inline-flex;align-items:center;min-height:30px;max-width:170px;padding:5px 9px;border-radius:999px;border:1px solid var(--border);background:var(--inner);color:var(--sub);font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sync-pill.ok{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.10);color:#86efac}
.sync-pill.busy{border-color:rgba(59,130,246,.35);background:rgba(59,130,246,.10);color:#93c5fd}
.sync-pill.warn{border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.10);color:#fcd34d}
.sync-pill.err{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.10);color:#fca5a5}

/* Inputs */
.inp{background:var(--inner);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:8px 12px;font-size:14px;width:100%;transition:all .2s}
.inp:focus{box-shadow:0 0 0 2px rgba(59,130,246,.35)}
.inp-area{resize:none}

/* Stepper */
.stepper{display:flex;align-items:center;gap:8px}
.stepper-lbl{font-size:12px;color:var(--sub);flex:1}
.stepper-btn{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--border);color:var(--text);font-size:16px;transition:all .15s;flex-shrink:0}
.stepper-btn:hover{filter:brightness(1.2)}
.stepper-val{width:48px;height:28px;text-align:center;font-size:13px;font-weight:700;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text);transition:all .15s}
.stepper-val:hover{border-color:var(--accent)}
.stepper-edit{width:48px;height:28px;text-align:center;font-size:13px;border-radius:8px;border:1px solid var(--accent);background:var(--bg2);color:var(--text);padding:0}

/* Slider */
.slider-row{display:flex;gap:6px}
.slider-btn{flex:1;height:28px;border-radius:8px;font-size:12px;font-weight:700;transition:all .15s}
.slider-on{background:var(--accent);color:#fff}
.slider-off{background:var(--border);color:var(--sub)}.slider-off:hover{filter:brightness(1.15)}

/* Stat cards */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
.stat-icon{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.stat-label{font-size:11px;font-weight:600;color:var(--sub)}
.stat-val{font-size:24px;font-weight:700;color:var(--text)}
.stat-sub{font-size:11px;color:var(--muted)}

/* Task card */
.task-row{display:flex;gap:12px}
.task-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.task-icon svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.task-body{flex:1;min-width:0}
.task-title-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:2px}
.task-title{font-size:14px;font-weight:600}
.chip{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600}
.task-sub{font-size:12px;color:var(--sub);margin-bottom:8px}
.task-context{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.task-btns{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.timer-display{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;font-family:'SF Mono',SFMono-Regular,'Cascadia Code','Fira Code',Consolas,monospace}
.timer-stepper{display:flex;align-items:center;gap:6px;margin-left:auto}
.timer-stepper .stepper-btn{width:26px;height:26px}
.timer-stepper .timer-display{margin-left:0;min-width:88px;justify-content:center}
.timer-active{color:#60a5fa}
.timer-idle{color:var(--sub)}
.timer-edit-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:2px;border-radius:4px;display:flex;align-items:center;opacity:.5;transition:all .15s}
.timer-edit-btn:hover{opacity:1;color:var(--accent)}
.time-editor{display:flex;align-items:center;gap:4px;margin-left:auto;background:var(--bg2);border:1px solid var(--accent);border-radius:10px;padding:4px 8px}
.time-editor input{width:32px;text-align:center;font-size:13px;font-weight:700;font-family:'SF Mono',SFMono-Regular,'Cascadia Code','Fira Code',Consolas,monospace;background:var(--inner);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:2px 0}
.time-editor input.time-editor-hours{width:44px}
.time-editor input:focus{border-color:var(--accent);box-shadow:0 0 0 1px rgba(59,130,246,.3)}
.time-editor span{font-size:13px;font-weight:700;color:var(--muted)}
.time-editor-btns{display:flex;gap:4px;margin-left:4px}
.time-editor-btns button{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;transition:all .15s}
.task-card{padding:18px}
.task-card .task-sub{margin-bottom:8px;max-width:72ch}
.task-meta-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.task-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.timer-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:12px;border:1px solid var(--border);background:var(--bg2);font-size:13px;font-weight:700;font-family:'SF Mono',SFMono-Regular,'Cascadia Code','Fira Code',Consolas,monospace}
.timer-pill.timer-active{border-color:rgba(96,165,250,.45);background:rgba(59,130,246,.12);color:#93c5fd}
.task-detail-grid{display:grid;gap:8px}
.task-panel{border:1px solid rgba(148,163,184,.14);border-radius:12px;padding:10px 12px;background:rgba(148,163,184,.04)}
.task-panel label{font-size:10px;font-weight:700;color:var(--muted);display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}
.metric-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.metric-copy{display:flex;flex-direction:column;gap:2px}
.metric-copy strong{font-size:13px}
.metric-copy span{font-size:11px;color:var(--sub)}
.metric-controls{display:flex;align-items:center;gap:8px}
.metric-value{min-width:52px;height:32px;padding:0 12px;display:inline-flex;align-items:center;justify-content:center;border-radius:10px;border:1px solid var(--border);background:var(--bg2);font-size:14px;font-weight:700;color:var(--text)}
.task-inline-metric{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding-top:12px;border-top:1px solid rgba(148,163,184,.14)}
.task-inline-metric-copy{display:flex;flex-direction:column;gap:2px}
.task-inline-metric-copy strong{font-size:13px;color:var(--text)}
.task-inline-metric-copy span{font-size:11px;color:var(--sub)}
@media(max-width:640px){
  .task-card{padding:16px}
  .metric-row{align-items:flex-start}
  .task-inline-metric{align-items:flex-start}
}

/* Day nav */
.day-nav{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.day-nav-date{font-size:22px;font-weight:700}
.day-nav-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px}
.day-nav-status{font-size:12px;color:#60a5fa;font-weight:600}
.day-nav-status.past{color:var(--sub)}
.day-nav-data-start{font-size:12px;color:var(--sub);font-weight:600}
.day-nav-data-start strong{color:var(--text);font-weight:700}
.day-nav-btns{display:flex;gap:8px}

/* Heatmap */
.heatmap-wrap{overflow-x:auto;padding-bottom:4px}
.heatmap{display:inline-flex;flex-direction:column;gap:1px}
.heatmap-months{display:flex;gap:1px;padding-left:32px;position:relative;height:16px}
.heatmap-month{position:absolute;font-size:10px;color:var(--muted)}
.heatmap-body{display:flex;gap:1px}
.heatmap-labels{display:flex;flex-direction:column;gap:1px;padding-right:4px;font-size:10px;color:var(--muted)}
.heatmap-label{height:11px;display:flex;align-items:center;justify-content:flex-end}
.heatmap-col{display:flex;flex-direction:column;gap:1px}
.heatmap-cell{width:11px;height:11px;border-radius:2px;cursor:pointer;transition:all .1s}
.heatmap-cell:hover{filter:brightness(1.3)}

/* Last 7 */
.range-stack{display:grid;gap:14px}
.range-widget{border:1px solid var(--border);background:var(--inner);border-radius:16px;padding:14px}
.range-widget-hdr{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.range-widget-title{display:flex;flex-direction:column;gap:2px}
.range-widget-title strong{font-size:13px;letter-spacing:.03em;text-transform:uppercase;color:var(--sub)}
.range-widget-title span{font-size:12px;color:var(--sub)}
.range-nav{display:flex;align-items:center;gap:8px}
.range-nav-btn{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:var(--border);color:var(--text);transition:all .15s}
.range-nav-btn:hover{filter:brightness(1.12)}
.range-nav-btn[disabled]{opacity:.45;cursor:not-allowed;filter:none}
.range-summary-card{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.range-summary-stat{border:1px solid var(--border);border-radius:12px;padding:14px;background:var(--card)}
.range-summary-k{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:4px}
.range-summary-v{font-size:24px;font-weight:800}
.range-summary-s{font-size:11px;color:var(--sub);margin-top:2px}
.last7-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.day7{border-radius:12px;padding:10px 4px;text-align:center;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;transition:all .15s}
.day7:hover{filter:brightness(1.1)}
.day7.sel{box-shadow:0 0 0 2px var(--accent)}
.day7.full{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.3)}
.day7-dow{font-size:10px;font-weight:600;color:var(--sub)}
.day7-num{font-size:20px;font-weight:700;color:var(--text)}
.day7-hours{font-size:12px;font-weight:700;color:var(--text);margin-top:4px}
.day7-score{font-size:10px;font-weight:600}

/* Charts */
.chart-wrap{position:relative;height:200px;margin-top:8px}
.chart-desc{font-size:12px;color:var(--sub);margin-bottom:8px}
.chart-empty{font-size:13px;color:var(--sub);text-align:center;padding:32px 0}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.stats-grid{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}.last7-grid{grid-template-columns:repeat(7,1fr)}.range-summary-card{grid-template-columns:1fr}}
@media(max-width:480px){.last7-grid{gap:4px}.day7{padding:6px 2px}}

/* Grip icon dots */
.grip-dots{display:inline-flex;flex-direction:column;gap:3px;opacity:.3}
.grip-row{display:flex;gap:3px}
.grip-dot{width:3px;height:3px;border-radius:50%;background:var(--sub)}

/* Done state for task card */
.task-done{opacity:.72}

/* Chess.com / Lichess section */
.cc-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.cc-stat{background:var(--inner);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.cc-stat-label{font-size:10px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.03em;margin-bottom:2px}
.cc-stat-val{font-size:20px;font-weight:700;color:var(--text)}
.cc-stat-sub{font-size:10px;color:var(--sub)}
.cc-refresh{font-size:11px;color:var(--accent);cursor:pointer;background:none;border:none;font-weight:600;padding:4px 8px;border-radius:6px;transition:all .15s}
.cc-refresh:hover{background:rgba(59,130,246,.1)}
.cc-loading{font-size:13px;color:var(--sub);text-align:center;padding:24px 0}
.cc-error{font-size:12px;color:var(--red);text-align:center;padding:16px 0}

const STORAGE_RECOVERY_PREFIX = SK+'-recovery-';
const CLOUD_SYNC_CONFIG = {

};
const CLOUD_SYNC_META_KEY = 'chess-trainer-cloud-sync-meta-v1';

let cloudSyncState = {
  configured: false,

let cloudSyncPushTimer = 0;

function readSavedDashboardState(){
  let best=null,bestScore=-1;
  for(const key of LEGACY_STORAGE_KEYS){
    try{
      const raw=localStorage.getItem(key);
      if(!raw) continue;
      const parsed=JSON.parse(raw);
      const score=stateRecoveryScore(parsed);
      if(score>bestScore){
        best=parsed;
        bestScore=score;
      }
    }catch(_err){}
  }
  return best;
}
function stateRecoveryScore(value){
  if(!value||typeof value!=='object') return 0;
  const history=value.history&&typeof value.history==='object'?Object.keys(value.history).length:0;
  let historyWeight=0;
  if(value.history&&typeof value.history==='object'){
    Object.keys(value.history).forEach(function(dayKey){
      historyWeight+=Math.min(5000,dayValueScore(value.history[dayKey]));
    });
  }
  return history
    +Math.floor(historyWeight/250)
    +(value.ccUser?20:0)+(value.ccCache?20:0)
    +(value.lcUser?20:0)+(value.lcCache?20:0)
    +(value.cvCache?15:0)+(value.lastTrackerSync?10:0);
}
function historyDayCount(value){
  return value&&value.history&&typeof value.history==='object'?Object.keys(value.history).length:0;
}
function dayValueScore(day){
  if(!day||typeof day!=='object') return 0;
  let score=0;
  try{
    if(day.started) score+=20;
    if(day.dailyScore) score+=10;
    if(day.dailyElo||day.dailyEloManual) score+=10;
    if(day.lastTrackerSync) score+=25;
    if(day.lastExternalGameSync) score+=25;
    if(day.openingCourses) score+=25;
    if(day.chessableTacticsCourses) score+=25;
    if(day.tasks&&typeof day.tasks==='object'){
      Object.keys(day.tasks).forEach(function(key){
        const task=day.tasks[key]||{};
        score+=(Number(task.elapsedSeconds)||0)>0?15:0;
        score+=(Number(task.count)||0)>0?15:0;
        score+=task.done?5:0;
      });
    }
    score+=Math.min(3000,JSON.stringify(day).length);
  }catch(_err){}
  return score;
}
function readRecoveryStates(){
  const states=[];
  try{
    for(let i=0;i<localStorage.length;i++){
      const key=localStorage.key(i)||'';
      if(!key.startsWith(STORAGE_RECOVERY_PREFIX)) continue;
      const raw=localStorage.getItem(key);
      if(!raw) continue;
      let parsed=null;
      try{parsed=JSON.parse(raw)}catch(_err){continue}
      const score=stateRecoveryScore(parsed);
      const ts=Number(key.slice(STORAGE_RECOVERY_PREFIX.length))||0;
      states.push({key:key,state:parsed,score:score,ts:ts});
    }
  }catch(_err){}
  return states.sort(function(a,b){
    return (b.score-a.score)||(b.ts-a.ts);
  });
}
function readBestRecoveryState(){
  const states=readRecoveryStates();
  const best=states[0];
  return best?best.state:null;
}
function mergeRecoverySnapshot(saved,recovery){
  if(!saved||typeof saved!=='object'||!recovery||typeof recovery!=='object') return false;
  let filled=false;
  if(recovery.history&&typeof recovery.history==='object'){
    if(!saved.history||typeof saved.history!=='object') saved.history={};

  Object.keys(platforms||{}).forEach(function(platform){

    const breakdownSeconds=estimateGameBreakdownAutoSeconds(byType);
    const autoSeconds=Math.max(0,Number(entry.autoSeconds)||0,breakdownSeconds,(fallbackType?games*gameTypeAutoMinutes(fallbackType)*60:0));
    const scoreText=entry.scoreText||'';
    const points=Math.max(0,Number(entry.points)||parseGameScorePoints(scoreText));
    totals.platforms[platform]={games:games,autoSeconds:autoSeconds,points:points,scoreText:scoreText||fmtGameScore(points,games),byType:byType,syncedAt:Number(entry.syncedAt)||0};
    totals.games+=games;

    });
    if((Number(entry.syncedAt)||0)>=latestTs){
      latestTs=Number(entry.syncedAt)||0;

    obj[target+'Lines']=(Number(obj[target+'Lines'])||0)+sourceLines;
    obj[target+'Seconds']=(Number(obj[target+'Seconds'])||0)+sourceSeconds;
    obj[source+'Lines']=0;
    obj[source+'Seconds']=0;
    return true;
  }

  if(inferred==='white'&&moveSideCounts('black','white',entry)) changed=true;
  if(inferred==='black'&&moveSideCounts('white','black',entry)) changed=true;
  Object.values(entry.chapters||{}).forEach(function(chapter){
    if(inferred==='white'&&moveSideCounts('black','white',chapter)) changed=true;

function bindHoldRepeat(button,fn){
  let startTimer=0;
  let repeatTimer=0;
  let holdTriggered=false;
  let pressed=false;
  let repeatDelay=260;
  let activePointerId=null;
  let globalsBound=false;
  let lastStopWasHold=false;
  function handleForeignPointerDown(e){
    if(!pressed) return;
    if(e.target===button || button.contains(e.target)) return;
    stop();
  }
  function handleVisibilityStop(){
    if(document.visibilityState!=='visible') stop();
  }
  const bindGlobals=()=>{
    if(globalsBound) return;
    globalsBound=true;
    document.addEventListener('pointerdown',handleForeignPointerDown,true);
    window.addEventListener('blur',stop);
    document.addEventListener('visibilitychange',handleVisibilityStop,true);
  };
  const unbindGlobals=()=>{
    if(!globalsBound) return;
    globalsBound=false;
    document.removeEventListener('pointerdown',handleForeignPointerDown,true);
    window.removeEventListener('blur',stop);
    document.removeEventListener('visibilitychange',handleVisibilityStop,true);
  };
  const clear=()=>{
    if(startTimer){clearTimeout(startTimer);startTimer=0;}
    if(repeatTimer){clearTimeout(repeatTimer);repeatTimer=0;}
  };
  const stop=()=>{
    const wasHold=holdTriggered;
    const pointerId=activePointerId;
    pressed=false;
    clear();
    holdTriggered=false;
    repeatDelay=260;
    activePointerId=null;
    unbindGlobals();
    if(pointerId!==null && button.hasPointerCapture && button.hasPointerCapture(pointerId)){
      try{button.releasePointerCapture(pointerId)}catch(e){}
    }
    lastStopWasHold=wasHold;
    return wasHold;
  };
  const tick=()=>{
    if(!pressed) return;
    fn();
    repeatDelay=Math.max(120,repeatDelay-25);
    repeatTimer=setTimeout(tick,repeatDelay);
  };
  const start=()=>{
    clear();
    pressed=true;
    holdTriggered=false;
    repeatDelay=260;
    bindGlobals();
    startTimer=setTimeout(()=>{
      if(!pressed) return;
      holdTriggered=true;
      fn();
      repeatTimer=setTimeout(tick,repeatDelay);
    },450);
  };
  button.addEventListener('pointerdown',e=>{
    if(e.button!==0) return;
    e.preventDefault();
    activePointerId=e.pointerId;
    if(button.setPointerCapture){
      try{button.setPointerCapture(e.pointerId)}catch(err){}
    }
    start();
  });
  button.addEventListener('pointerup',e=>{
    if(activePointerId!==null && e.pointerId!==activePointerId) return;
    const wasHold=pressed?stop():lastStopWasHold;
    lastStopWasHold=false;
    if(!wasHold) fn();
  });
  button.addEventListener('pointercancel',()=>{stop();lastStopWasHold=false;});
  button.addEventListener('lostpointercapture',()=>{if(pressed) stop();});
  button.addEventListener('click',e=>{
    e.preventDefault();
    e.stopPropagation();
  });
}

function stopAllTimers(dk){
  const d=ensureDay(dk);
  TK.forEach(k=>stopTimerTask(d.tasks[k]));
  persist();
}

function startTimer(dk,key){
  sndClick();
  const d=ensureDay(dk);
  stopAllTimersEverywhere();
  d.tasks[key].timerRunning=true;d.tasks[key].timerStartedAt=Date.now();d.started=true;
  persist();render();
}

function stopTimer(dk,key){
  sndClick();
  const d=ensureDay(dk),t=d.tasks[key];
  stopTimerTask(t);
  persist();render();
}

function markDone(dk,key){
  sndClick();
  const d=ensureDay(dk),t=d.tasks[key];
  stopTimerTask(t);
  t.done=!t.done;persist();render();
}

function setCount(dk,key,v){
  if(key==='tactics'){
    const day=ensureDay(dk);
    const tool=getManualTacticsTool();
    const otherCount=getTotalTacticsDisplayCount(dk,day)-getTacticsToolDisplayCount(dk,day,tool);
    setTacticsToolCount(dk,tool,Math.max(0,(Number(v)||0)-otherCount));
    return;
  }
  ensureDay(dk).tasks[key].count=Math.max(0,v);persist();render()
}
function setTaskElapsedSeconds(dk,key,sec){
  const day=ensureDay(dk);
  if(key==='tactics'){
    const tool=getManualTacticsTool();
    const selectedElapsed=getTacticsToolDisplayElapsedSeconds(dk,day,tool);
    const otherElapsed=getTotalTacticsDisplayElapsedSeconds(dk,day)-selectedElapsed;
    const task=day.tasks.tactics;
    const liveElapsed=(tool===getManualTacticsTool() && task && task.timerRunning && task.timerStartedAt)
      ? (Date.now()-task.timerStartedAt)/1000
      : 0;
    const targetSelectedElapsed=Math.max(0,Number(sec)||0)-otherElapsed;
    const storedElapsed=Math.max(0,targetSelectedElapsed-liveElapsed);
    setTacticsToolElapsedSeconds(dk,tool,storedElapsed);
    return;
  }
  const task=day.tasks[key];
  const wasRunning=!!task.timerRunning;
  task.elapsedSeconds=Math.max(0,Math.floor(sec));
  if(wasRunning){
    task.timerRunning=true;
    task.timerStartedAt=Date.now();
  }else{
    task.timerRunning=false;
    task.timerStartedAt=null;
  }
  persist();
  render();
}
function adjustTaskTime(dk,key,deltaSec){
  const day=ensureDay(dk);
  setTaskElapsedSeconds(dk,key,getTaskDisplayElapsedSeconds(dk,key,day)+deltaSec);
}

// STREAKS
// ═══════════════════════════════════════════════════════════
function calcStreaks(){
  let cur=0,d=NOW();
  if(!(state.history[d]&&dFull(state.history[d]))) d=addD(d,-1);
  while(state.history[d]&&dFull(state.history[d])){cur++;d=addD(d,-1)}
  let best=0,s=0,prev=null;
  Object.keys(state.history).sort().forEach(k=>{
    const consecutive=prev&&addD(prev,1)===k;
    if(dFull(state.history[k])){
      s=consecutive?s+1:1;
      if(s>best)best=s;
    }else{
      s=0;
    }
    prev=k;
  });
  return{cur,best};
}

let charts={};
let chartRenderTimer=0;

function scheduleRenderCharts(){
  if(chartRenderTimer) clearTimeout(chartRenderTimer);
  chartRenderTimer=setTimeout(function(){
    chartRenderTimer=0;
    try{
      renderCharts();
    }catch(err){
      console.warn('[Chess Trainer] Chart render failed', err);
      pushDebugLog('render','charts_error',{error:err&&err.message?err.message:String(err)});
    }
  },0);
}

function render(){
  // Theme
  document.body.className=state.isDark?'':'light';
  document.getElementById('versionBadge').textContent=APP_VERSION;
  document.getElementById('themeBtn').innerHTML=state.isDark?'<span style="color:#fbbf24">'+svg('sun',16)+'</span>':svg('moon',16);
  document.getElementById('soundBtn').innerHTML=state.soundOn?svg('volOn',16):'<span style="color:var(--muted)">'+svg('volOff',16)+'</span>';
  // Update volume slider visibility
  const vw=document.getElementById('volWrap');if(vw)vw.style.display=state.soundOn?'flex':'none';
  const vs=document.getElementById('volSlider');if(vs)vs.value=state.volume||60;
  const vl=document.getElementById('volLabel');if(vl)vl.textContent=(state.volume||60)+'%';
  renderCloudSyncStatus();

  // Banner
  const dayToday=getDay(NOW());
  let activeTask=null;
  TK.forEach(k=>{if(dayToday.tasks[k].timerRunning)activeTask=k});
  const banner=document.getElementById('banner');
  if(activeTask){
    banner.classList.add('show');
    document.getElementById('bannerLabel').textContent=TASKS[activeTask].label;
    document.getElementById('bannerTime').textContent=fmtT(getEl(dayToday.tasks[activeTask]));
  }else{banner.classList.remove('show')}

  // Main sections
  const main=document.getElementById('main');
  const dayData=getDay(selectedDay);
  const streaks=calcStreaks();

  let html='';
  const skip=new Set();
  state.sectionOrder.forEach((sec,idx)=>{
    if(skip.has(sec)) return;
    // Merge stats into today
    if(sec==='today'){
      skip.add('stats');
      const score=dScore(dayData), full=dFull(dayData);
      const progressColor=full?'rgba(34,197,94,.12)':score>=Math.max(2,TK.length-1)?'rgba(250,204,21,.07)':score>=1?'rgba(59,130,246,.05)':'';
      const borderColor=full?'rgba(34,197,94,.35)':score>=Math.max(2,TK.length-1)?'rgba(250,204,21,.2)':'';
      const extraStyle=progressColor?'background:'+progressColor+';':'';
      const extraBorder=borderColor?'border-color:'+borderColor+';':'';
      html+='<div class="card'+(full?' card-complete':'')+'" draggable="true" data-sec="'+sec+'" data-idx="'+idx+'" style="'+extraStyle+extraBorder+'">';
      html+='<div class="section-hdr" data-sec="'+sec+'">'+gripHTML()+' <span style="color:var(--sub)">'+svg(secIcon(sec),16)+'</span> <span class="section-lbl">'+secLabel(sec)+'</span>';
      if(full) html+=' <span style="color:#4ade80;font-size:11px;font-weight:600;margin-left:auto">✓ All tasks complete</span>';
      html+='</div>';
      html+=renderToday(dayData,streaks);
      html+='</div>';
    } else if(sec==='stats'){
      // already merged into today, skip
      return;
    } else {
      html+='<div class="card" draggable="true" data-sec="'+sec+'" data-idx="'+idx+'">';
      html+='<div class="section-hdr" data-sec="'+sec+'">'+gripHTML()+' <span style="color:var(--sub)">'+svg(secIcon(sec),16)+'</span> <span class="section-lbl">'+secLabel(sec)+'</span></div>';
      html+=renderSection(sec,dayData);
      html+='</div>';
    }
  });
  main.innerHTML=html;

  // Wire up events after render
  try{
    wireEvents(dayData);
  }catch(err){
    console.error('[Chess Trainer] Failed to wire controls', err);
    pushDebugLog('render','wire_events_error',{error:err&&err.message?err.message:String(err)});
  }
  try{
    applyButtonTooltips();
  }catch(err){
    console.warn('[Chess Trainer] Failed to apply tooltips', err);
    pushDebugLog('render','tooltips_error',{error:err&&err.message?err.message:String(err)});
  }

  // Always rebuild charts after innerHTML replaces canvases, but let controls become clickable first.
  scheduleRenderCharts();
}

const CV_MONTHS=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
function cvHasValue(value){
  if(value===null||value===undefined) return false;
  if(typeof value==='string'){
    const text=value.trim();
    if(!text) return false;
    if(/^[-–—?]+$/.test(text)) return false;
    if(/^change:\s*[-–—?]+$/i.test(text)) return false;
    if(/^best:\s*[-–—?]+\s*wins?$/i.test(text)) return false;
    if(/^[-–—?]+\/day$/i.test(text)) return false;
    return true;
  }
  if(Array.isArray(value)) return value.length>0;
  if(typeof value==='object') return Object.keys(value).length>0;
  return true;
}
function cvMergeData(base,incoming){
  const merged=Object.assign({},base||{});
  if(!incoming) return merged;
  Object.keys(cvData).forEach(function(key){
    const next=incoming[key];
    if(next===undefined) return;
    if(Array.isArray(next)){
      if(next.length>0||!Array.isArray(merged[key])) merged[key]=next.slice();
      return;
    }
    if(next&&typeof next==='object'){
      if(cvHasValue(next)) merged[key]=Object.assign({},merged[key]||{},next);
      return;
    }
    if(cvHasValue(next)) merged[key]=next;
  });
  return merged;
}

function cvGamesForDate(games,dayKey){
  return (Array.isArray(games)?games:[]).filter(function(game){
    return cvParseDateKey(game&&game.date)===dayKey;
  });
}
function cvParseDateKey(text){
  const match=String(text||'').trim().match(/\b([A-Za-z]{3,9})\s+(\d{1,2})(?:,?\s+(\d{4}))?\b/);
  if(!match) return null;
  const month=CV_MONTHS.indexOf(match[1].slice(0,3).toLowerCase());
  if(month<0) return null;
  const year=match[3]?Number(match[3]):new Date().getFullYear();
  const d=new Date(year,month,Number(match[2]));
  return Number.isNaN(d.getTime())?null:dk(d);
}
function cvSanitizeText(value){
  return String(value||'').replace(/\s+/g,' ').trim();
}
function cvIsUnknownOpponent(value){
  const text=cvSanitizeText(value).toLowerCase();
  return !text||text==='unknown'||text==='?'||text==='n/a';
}
function cvGameQuality(game){
  if(!game||typeof game!=='object') return 0;
  let score=0;
  ['date','result','ratingDelta','moves','opponent','opponentRating'].forEach(function(key){
    if(cvSanitizeText(game[key])) score++;
  });
  return score;
}
function cvGamesLooselyMatch(a,b){
  if(cvSanitizeText(a&&a.date).toLowerCase()!==cvSanitizeText(b&&b.date).toLowerCase()) return false;
  if(cvSanitizeText(a&&a.result).toLowerCase()!==cvSanitizeText(b&&b.result).toLowerCase()) return false;
  if(cvSanitizeText(a&&a.ratingDelta)!==cvSanitizeText(b&&b.ratingDelta)) return false;

  const aMoves=cvSanitizeText(a&&a.moves);
  const bMoves=cvSanitizeText(b&&b.moves);
  if(aMoves&&bMoves&&aMoves!==bMoves) return false;

  const aOpponentRating=cvSanitizeText(a&&a.opponentRating);
  const bOpponentRating=cvSanitizeText(b&&b.opponentRating);
  if(aOpponentRating&&bOpponentRating&&aOpponentRating!==bOpponentRating) return false;

  const aOpponent=cvSanitizeText(a&&a.opponent);
  const bOpponent=cvSanitizeText(b&&b.opponent);
  if(aOpponent&&bOpponent&&!cvIsUnknownOpponent(aOpponent)&&!cvIsUnknownOpponent(bOpponent)&&aOpponent!==bOpponent) return false;

  return true;
}
function cvPickBetterGame(a,b){
  return cvGameQuality(b)>cvGameQuality(a)?b:a;
}
function cvDedupeGames(games){
  const deduped=[];
  (Array.isArray(games)?games:[]).forEach(function(game){
    if(!game||typeof game!=='object') return;
    const matchIndex=deduped.findIndex(function(existing){
      return cvGamesLooselyMatch(existing,game);
    });
    if(matchIndex>=0) deduped[matchIndex]=cvPickBetterGame(deduped[matchIndex],game);
    else deduped.push(game);
  });
  return deduped;
}
function cvResolvedTodayGames(){
  const explicit=cvGamesForDate(cvData.todayGames,NOW());
  const recent=Array.isArray(cvData.recentGames)?cvData.recentGames.filter(Boolean):[];
  const recentToday=recent.filter(g=>cvParseDateKey(g&&g.date)===NOW());
  return cvDedupeGames(explicit.concat(recentToday));
}
function cvGamePoints(result){
  if(result==='win') return 1;
  if(result==='draw') return 0.5;
  return 0;
}
function fmtGameScore(points,total){
  if(!total) return '';
  const clean=Math.abs(points-Math.round(points))<0.001?String(Math.round(points)):String(Math.round(points*10)/10).replace(/\.0$/,'');
  return clean+' / '+total;
}
function cvTodaySummary(){
  const games=cvResolvedTodayGames();
  const wins=games.filter(g=>g.result==='win').length;
  const losses=games.filter(g=>g.result==='loss').length;
  const draws=Math.max(0,games.length-wins-losses);
  const points=games.reduce((sum,g)=>sum+cvGamePoints(g.result),0);
  return {games:wins+losses+draws,wins,losses,draws,points,scoreText:fmtGameScore(points,games.length),items:games};
}
function buildGameSyncSummary(platform,games,extractType,extractOutcome){
  const list=Array.isArray(games)?games.filter(Boolean):[];
  const byType=gameTypeBreakdown();
  let latestType='';
  let autoSeconds=0;
  let points=0;
  list.forEach(function(game){
    const type=normalizeGameType(extractType(game));
    if(type){
      byType[type]+=1;
      autoSeconds+=gameTypeAutoMinutes(type)*60;
      latestType=type;
    }
    if(typeof extractOutcome==='function'){
      points+=externalGamePointsForOutcome(extractOutcome(game));
    }
  });
  return {platform:platform,games:list.length,byType:byType,autoSeconds:autoSeconds,points:points,scoreText:fmtGameScore(points,list.length),latestType:latestType,syncedAt:Date.now()};
}
function applyExternalGamesToDay(dayKey,platform,summary){
  const syncSummary=summary&&typeof summary==='object'?summary:{platform:platform,games:Number(summary)||0,byType:gameTypeBreakdown(),autoSeconds:0,latestType:'',syncedAt:Date.now()};
  const count=Math.max(0,Number(syncSummary.games)||0);
  if(count<=0) return false;
  const day=ensureDay(dayKey);
  if(!day.lastExternalGameSync||typeof day.lastExternalGameSync!=='object') day.lastExternalGameSync={};
  day.lastExternalGameSync[platform]={
    games:count,
    byType:sanitizeGameBreakdown(syncSummary.byType),
    autoSeconds:Math.max(0,Number(syncSummary.autoSeconds)||0),
    points:Math.max(0,Number(syncSummary.points)||0),
    scoreText:syncSummary.scoreText||'',
    latestType:normalizeGameType(syncSummary.latestType),
    syncedAt:Number(syncSummary.syncedAt)||Date.now()
  };
  const totals=summarizeExternalGamePlatforms(day);
  day.tasks.games.count=Math.max(day.tasks.games.count||0,totals.games);
  day.tasks.games.elapsedSeconds=Math.max(day.tasks.games.elapsedSeconds||0,totals.autoSeconds);
  day.tasks.games.done=true;
  day.started=true;
  if(totals.latestPlatform&&GAME_PLATFORMS[totals.latestPlatform]) day.gamePlatform=totals.latestPlatform;
  if(totals.latestType&&GAME_TYPES[totals.latestType]) day.gameType=totals.latestType;
  const autoScore=totals.scoreText;
  if(autoScore) day.dailyScore=autoScore;
  persist();
  return true;
}
function applyExternalGamesToToday(platform,summary){
  return applyExternalGamesToDay(NOW(),platform,summary);
}
function applyExternalGamesByDate(platform,games,extractDayKey,extractType,extractOutcome){
  const groups={};
  const allowedDays=externalGameSyncDayKeySet();
  (Array.isArray(games)?games:[]).forEach(function(game){
    const dayKey=extractDayKey(game);
    if(!dayKey||!allowedDays.has(dayKey)) return;
    if(!groups[dayKey]) groups[dayKey]=[];
    groups[dayKey].push(game);
  });
  return Object.keys(groups).sort().reduce(function(applied,dayKey){
    return applyExternalGamesToDay(dayKey,platform,buildGameSyncSummary(platform,groups[dayKey],extractType,extractOutcome))||applied;
  },false);
}
function gamesAppGameMs(game){
  return normalizeTimestampMs(game&&game.playedAt);
}
function gamesAppGamesBySource(source){
  const appState=readJsonStorage(GAMES_APP_STORAGE_KEY)||{};

    return game&&game.source===source&&gamesAppGameMs(game)&&normalizeGameType(game.speed);
  });

function gamesAppGamesForDay(source,dayKey){
  const seen=new Set();
  return filterGamesForDisplayDay(dayKey,gamesAppGamesBySource(source),gamesAppGameMs).filter(function(game){
    const key=(game&&game.id)||String(source)+'_'+String(gamesAppGameMs(game));
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}
function syncGamesAppStorageToHistory(reason){
  let applied=false;
  ['chesscom','lichess'].forEach(function(source){
    const sourceGames=gamesAppGamesBySource(source);
    if(!sourceGames.length) return;
    applied=applyExternalGamesByDate(source,sourceGames,function(game){
      return dateKeyFromTimestamp(gamesAppGameMs(game));
    },function(game){
      return game&&game.speed;
    },function(game){
      return game&&game.result;
    })||applied;
    const todayGames=gamesAppGamesForDay(source,NOW());
    if(todayGames.length){
      applied=applyExternalGamesToDay(NOW(),source,buildGameSyncSummary(source,todayGames,function(game){
        return game&&game.speed;
      },function(game){
        return game&&game.result;
      }))||applied;
    }
  });
  if(applied){
    pushDebugLog('games','analysis_storage_'+reason,{
      chesscom:gamesAppGamesForDay('chesscom',NOW()).length,
      lichess:gamesAppGamesForDay('lichess',NOW()).length
    });
  }
  return applied;
}

  h+='</div>';

  // Recent games
  const games=cvDedupeGames(tg.length>0?tg:(cvData.recentGames||[])).slice(0,6);
  if(games.length>0){
    h+='<div style="margin-top:4px">';
    games.forEach(function(g){
      const rc=g.result==='win'?'#4ade80':g.result==='loss'?'#f87171':'#cbd5e1';
      const rl=g.result==='win'?'W':g.result==='loss'?'L':'D';
      h+='<div style="display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:8px;background:var(--inner);border:1px solid var(--border);margin-bottom:3px;font-size:12px">';
      h+='<span style="font-weight:600;color:'+rc+'">'+rl+'</span>';
      h+='<span style="color:var(--text);font-weight:500">vs '+esc(g.opponent||'?');
      if(g.opponentRating) h+=' <span style="color:var(--sub)">('+esc(g.opponentRating)+')</span>';
      h+='</span>';
      if(g.date) h+='<span style="margin-left:auto;color:var(--sub);font-size:10px">'+esc(g.date)+'</span>';
      h+='</div>';
    });
    h+='</div>';
  }

  return h;
}

function getCCUser(){return state.ccUser||CC_DEFAULT_USER}

// Chess.com cache: restore from localStorage
function syncChessComGamesToHistory(reason){
  let applied=applyExternalGamesByDate('chesscom',ccData.games,function(game){
    return game&&game.end_time?dk(new Date(game.end_time*1000)):'';
  },function(game){
    return game&&game.time_class;
  },function(game){
    return ccPlayerResult(game).outcome;
  });
  const todayGames=ccTodayGames();
  if(todayGames.length){
    applied=applyExternalGamesToDay(NOW(),'chesscom',buildGameSyncSummary('chesscom',todayGames,function(game){
      return game&&game.time_class;
    },function(game){
      return ccPlayerResult(game).outcome;
    }))||applied;
  }
  pushDebugLog('games','chesscom_'+reason,{games:(ccData.games||[]).length,today:ccTodayGames().length,applied:applied});
  return applied;
}
(function restoreCCCache(){
  const todayState=state&&state.history?state.history[NOW()]:null;
  if(todayState&&clearLegacyChessComPuzzleRushAutoSync(todayState)) persist();
  if(!getCCUser()){
    if(state.ccCache) delete state.ccCache;
    return;
  }
  if(state.ccCache && state.ccCache.stats && sameUser(state.ccCache.username,getCCUser())){
    const c=state.ccCache;
    const stale=(c.day||'')!==NOW();
    const oldFlatHistory=c.history&&c.history.rapid===undefined?c.history:{};
    const missingHistory=!c.history||c.history.rapid===undefined||c.history.blitz===undefined||c.history.bullet===undefined;
    // Restore the recent rolling window and let the auto-refresh tighten it up.
    ccData.stats=c.stats;
    ccData.games=c.games||[];
    ccData.history={rapid:(c.history&&c.history.rapid)||oldFlatHistory||{},blitz:(c.history&&c.history.blitz)||{},bullet:(c.history&&c.history.bullet)||{}};
    ccData.lastFetch=c.lastFetch||0;
    if(ccData.games.length&&syncChessComGamesToHistory('cache_restore')) persist();
    // Default behavior: always refresh external data on page load.
    if(state.autoRefreshExternalOnLoad!==false){
      setTimeout(()=>ccFetch(),stale||missingHistory?250:500);
    }
  } else {
    if(state.ccCache && !sameUser(state.ccCache.username,getCCUser())) delete state.ccCache;
    // No cache yet — auto-fetch on startup once a username has been set.
    setTimeout(()=>ccFetch(),300);
  }
})();

function ccFetch(){
  const user=getCCUser();
  if(!user){
    ccData.loading=false;
    ccData.error=null;
    render();
    return;
  }
  if(ccData.loading) return;
  ccData.loading=true; ccData.error=null;
  render();
  const userLower=user.toLowerCase();
  const userPath=encodeURIComponent(user);
  const now=new Date();
  const archiveMonths=[];
  const recentDayKeys=externalGameSyncDayKeySet();
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    archiveMonths.push({
      year:d.getFullYear(),
      month:String(d.getMonth()+1).padStart(2,'0'),
      dateKey:dk(d)
    });
  }

  Promise.all([
    fetch('https://api.chess.com/pub/player/'+userPath+'/stats').then(r=>{if(!r.ok)throw new Error('Stats: '+r.status);return r.json()}),
    Promise.all(archiveMonths.map(m=>
      fetch('https://api.chess.com/pub/player/'+userPath+'/games/'+m.year+'/'+m.month)
        .then(r=>{if(!r.ok)throw new Error('Archive '+m.year+'-'+m.month+': '+r.status);return r.json()})
        .then(res=>({dateKey:m.dateKey,games:res.games||[]}))
    ))
  ]).then(([stats,archives])=>{
    if(!sameUser(user,getCCUser())){
      ccData.loading=false;
      return;
    }
    ccData.stats=stats;
    const recentGames=[];
    const recentSeen=new Set();
    const history={
      rapid:{...ccData.history.rapid},
      blitz:{...ccData.history.blitz},
      bullet:{...ccData.history.bullet}
    };
    archives.forEach(month=>{
      month.games
        .filter(g=>['rapid','blitz','bullet'].includes(g.time_class)&&g.end_time)
        .sort((a,b)=>(a.end_time||0)-(b.end_time||0))
        .forEach(game=>{
          const endDate=dk(new Date(game.end_time*1000));
          const isWhite=game.white&&game.white.username&&game.white.username.toLowerCase()===userLower;
          const mySide=isWhite?game.white:game.black;
          if(mySide&&typeof mySide.rating==='number'&&history[game.time_class]){
            history[game.time_class][endDate]=mySide.rating;
          }
          if(!recentDayKeys.has(endDate)) return;
          const gameKey=game.url||game.uuid||(game.end_time+'_'+((game.white&&game.white.rating)||'')+'_'+((game.black&&game.black.rating)||''));
          if(recentSeen.has(gameKey)) return;
          recentSeen.add(gameKey);
          recentGames.push(game);
        });
    });
    ccData.games=recentGames.sort((a,b)=>(b.end_time||0)-(a.end_time||0));
    ccData.history=history;
    ccData.loading=false;
    ccData.lastFetch=Date.now();
    state.ccCache={username:user, stats:ccData.stats, games:ccData.games, history:ccData.history, lastFetch:ccData.lastFetch, day:NOW()};
    syncChessComGamesToHistory('fetch');
    persist();
    render();
  }).catch(err=>{
    if(!sameUser(user,getCCUser())) return;
    ccData.loading=false;
    ccData.error=err.message||'Failed to load';
    pushDebugLog('games','chesscom_error',{error:ccData.error});
    render();
  });
}

function ccGamesForDay(dayKey){
  if(!ccData.games) return [];
  const seen=new Set();
  return filterGamesForDisplayDay(dayKey,ccData.games,function(game){
    return game&&game.end_time?game.end_time*1000:0;
  }).filter(g=>{
    if(g.time_class==='daily') return false;
    const key=g.url||g.uuid||(g.end_time+'_'+((g.white&&g.white.rating)||'')+'_'+((g.black&&g.black.rating)||''));
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}
function ccTodayGames(){
  return ccGamesForDay(NOW());
}

function ccPlayerResult(g){
  const isWhite=g.white&&g.white.username&&g.white.username.toLowerCase()===getCCUser().toLowerCase();
  const result=(isWhite?g.white:g.black).result;
  if(result==='win') return {outcome:'win'};
  if(['agreed','stalemate','repetition','insufficient','50move','timevsinsufficient','draw'].includes(result)) return {outcome:'draw'};
  return {outcome:'loss'};
}
function renderTodayTypeBreakdown(byType){

function chessComTodayDisplayData(games){
  const list=Array.isArray(games)?games:[];
  const byType=gameTypeBreakdown();
  const items=list.map(function(g){
    const res=ccPlayerResult(g);
    const isWhite=g.white&&g.white.username&&g.white.username.toLowerCase()===getCCUser().toLowerCase();
    const opp=isWhite?(g.black&&g.black.username||'?'):(g.white&&g.white.username||'?');
    const oppR=isWhite?(g.black&&g.black.rating||'?'):(g.white&&g.white.rating||'?');
    const tc=gameTypeLabel(g.time_class);
    const colorDot=isWhite?'#fff':'#1e293b';
    const resColor=res.outcome==='win'?'#4ade80':res.outcome==='loss'?'#f87171':'#cbd5e1';
    const resLabel=res.outcome==='win'?'W':res.outcome==='loss'?'L':'D';
    const endDate=g.end_time?new Date(g.end_time*1000):null;
    const timeStr=endDate?endDate.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}):'';
    const type=normalizeGameType(g.time_class);
    if(type) byType[type]+=1;
    return {colorDot:colorDot,colorBorder:'#94a3b8',colorTitle:isWhite?'White':'Black',resultColor:resColor,resultLabel:resLabel,opponent:opp,opponentRating:String(oppR),typeLabel:tc,timeLabel:timeStr};
  });
  return {byType:byType,items:items};
}
function chessComRecentDisplayData(games){
  const list=Array.isArray(games)?games:[];
  const items=list.map(function(g){
    const res=ccPlayerResult(g);
    const isWhite=g.white&&g.white.username&&g.white.username.toLowerCase()===getCCUser().toLowerCase();
    const opp=isWhite?(g.black&&g.black.username||'?'):(g.white&&g.white.username||'?');
    const oppR=isWhite?(g.black&&g.black.rating||'?'):(g.white&&g.white.rating||'?');
    const tc=gameTypeLabel(g.time_class);
    const endTime=g&&g.end_time?g.end_time*1000:0;
    return {
      colorDot:isWhite?'#fff':'#1e293b',

      colorTitle:isWhite?'White':'Black',
      resultColor:res.outcome==='win'?'#4ade80':res.outcome==='loss'?'#f87171':'#cbd5e1',

}

  if(!getCCUser()){

    +'<span style="font-size:13px;font-weight:600;color:var(--text)">'+svg('globe',14)+' '+esc(getCCUser())+(ccAgo?' <span style="font-size:10px;font-weight:400;color:var(--sub);margin-left:6px">'+ccAgo+'</span>':'')+'</span>'
    +'<div style="display:flex;gap:6px">'
    +'<button class="cc-refresh" id="ccChangeUser" title="Change username">'+svg('pencil',12)+' Change</button>'
    +'<button class="cc-refresh" id="ccRefresh">'+svg('refresh',12)+' Refresh</button>'
    +'</div></div>';

  // Stats grid
  const s=ccData.stats;
  h+='<div class="cc-stats">';

  // Ratings
  const ratingTypes=[
    {key:'chess_rapid',label:'Rapid'},
    {key:'chess_blitz',label:'Blitz'},
    {key:'chess_bullet',label:'Bullet'},
  ];
  ratingTypes.forEach(rt=>{
    const data=s[rt.key];
    if(data&&data.last){
      const r=data.last.rating;
      const w=(data.record&&data.record.win)||0;
      const l=(data.record&&data.record.loss)||0;
      const d=(data.record&&data.record.draw)||0;
      h+='<div class="cc-stat"><div class="cc-stat-label">'+rt.label+'</div><div class="cc-stat-val">'+r+'</div><div class="cc-stat-sub">'+w+'W / '+l+'L / '+d+'D</div></div>';
    }
  });

  // Tactics
  if(s.tactics&&s.tactics.highest){
    h+='<div class="cc-stat"><div class="cc-stat-label">Tactics</div><div class="cc-stat-val">'+s.tactics.highest.rating+'</div><div class="cc-stat-sub">highest rating</div></div>';
  }

  // Puzzle Rush
  if(s.puzzle_rush&&s.puzzle_rush.best){
    h+='<div class="cc-stat"><div class="cc-stat-label">Puzzle Rush</div><div class="cc-stat-val">'+s.puzzle_rush.best.score+'</div><div class="cc-stat-sub">best score ('+s.puzzle_rush.best.total_attempts+' attempts)</div></div>';
  }

  // Daily
  if(s.chess_daily&&s.chess_daily.last){
    h+='<div class="cc-stat"><div class="cc-stat-label">Daily</div><div class="cc-stat-val">'+s.chess_daily.last.rating+'</div><div class="cc-stat-sub">daily chess</div></div>';
  }

  h+='</div>';

  // Today summary — always show
  const todayG=ccTodayGames();
  const wins=todayG.filter(g=>ccPlayerResult(g).outcome==='win').length;
  const losses=todayG.filter(g=>ccPlayerResult(g).outcome==='loss').length;
  const draws=todayG.length-wins-losses;

  // Puzzle Rush daily (if available)
  const prDaily=chessComPuzzleRushDaily(s);
  const prDailyDisplaySeconds=estimateChessComPuzzleRushDisplaySeconds(prDaily&&prDaily.totalAttempts);
  const prStr=prDaily?(' &nbsp;·&nbsp; Puzzle Rush daily stat: <strong>'+prDaily.score+'</strong> ('+prDaily.totalAttempts+' attempts'+(prDailyDisplaySeconds?' · est. '+fmtT(prDailyDisplaySeconds):'')+')'):'';
  const todayDisplay=chessComTodayDisplayData(todayG);
  const recentDisplay=chessComRecentDisplayData((ccData.games||[]).slice(0,5));

  h+='<div class="cc-today-summary">'
    +'<strong>Today:</strong> '+todayG.length+' game'+(todayG.length!==1?'s':'')+' played';
  if(todayG.length>0) h+=' &nbsp;·&nbsp; <span style="color:#4ade80">'+wins+'W</span> / <span style="color:#f87171">'+losses+'L</span>'+(draws?' / '+draws+'D':'');
  h+=prStr+'</div>';
  h+=renderTodayTypeBreakdown(todayDisplay.byType);
  h+=renderRecentGameList('Recent games',recentDisplay.items);

  return h;
}

function lcFetch(){
  if(lcData.loading) return;
  lcData.loading=true; lcData.error=null;
  render();

  const lookbackStart=pd(externalGameSyncStartKey());
  lookbackStart.setHours(0,0,0,0);
  const sinceMs=lookbackStart.getTime();
  const user=getLCUser();
  const userPath=encodeURIComponent(user);

  Promise.all([
    // Profile + ratings
    fetch('https://lichess.org/api/user/'+userPath,{headers:{Accept:'application/json'}}).then(r=>{if(!r.ok)throw new Error('Profile: '+r.status);return r.json()}),
    // Today's games (NDJSON)
    fetch('https://lichess.org/api/games/user/'+userPath+'?since='+sinceMs+'&max=50',{headers:{Accept:'application/x-ndjson'}}).then(r=>{if(!r.ok)throw new Error('Games: '+r.status);return r.text()}),
    // Puzzle storm dashboard
    fetch('https://lichess.org/api/storm/dashboard/'+userPath,{headers:{Accept:'application/json'}}).then(r=>{if(!r.ok)return null;return r.json()}).catch(()=>null),
    fetch('https://lichess.org/api/user/'+userPath+'/activity',{headers:{Accept:'application/json'}}).then(r=>{if(!r.ok)return [];return r.json()}).catch(()=>[]),
    fetch('https://lichess.org/api/user/'+userPath+'/rating-history',{headers:{Accept:'application/json'}}).then(r=>{if(!r.ok)return [];return r.json()}).catch(()=>[])
  ]).then(([profile,gamesNdjson,storm,activity,ratingHistory])=>{
    if(!sameUser(user,getLCUser())){
      lcData.loading=false;
      return;
    }
    lcData.profile=profile;
    // Parse NDJSON for the rolling window and keep today's slice for the UI.
    lcData.recentGames=gamesNdjson.trim().split('\n').filter(l=>l.trim()).map(l=>{try{return JSON.parse(l)}catch(e){return null}}).filter(Boolean);
    lcData.todayGames=getLichessGamesForDay(NOW());
    lcData.storm=storm;
    lcData.activity=Array.isArray(activity)?activity:[];
    lcData.puzzleActivityByDay=buildLichessPuzzleActivityByDay(lcData.activity);
    const todayActivity=lcData.puzzleActivityByDay[NOW()]||null;
    lcData.todayPuzzleWins=todayActivity?(todayActivity.wins||0):0;
    lcData.todayPuzzleLosses=todayActivity?(todayActivity.losses||0):0;
    lcData.todayPuzzleDraws=todayActivity?(todayActivity.draws||0):0;
    lcData.todayPuzzleCount=todayActivity?(todayActivity.count||0):0;
    lcData.todayPuzzleRatingBefore=todayActivity&&todayActivity.ratingBefore!==null?todayActivity.ratingBefore:null;
    lcData.todayPuzzleRatingAfter=todayActivity&&todayActivity.ratingAfter!==null?todayActivity.ratingAfter:null;
    lcData.todayPuzzleRatingDelta=(lcData.todayPuzzleRatingBefore!==null&&lcData.todayPuzzleRatingAfter!==null)?(lcData.todayPuzzleRatingAfter-lcData.todayPuzzleRatingBefore):null;
    const history={rapid:{},blitz:{},bullet:{},puzzle:{}};
    (Array.isArray(ratingHistory)?ratingHistory:[]).forEach(entry=>{
      const key=(entry&&entry.name||'').toLowerCase();
      const target=key==='rapid'?'rapid':key==='blitz'?'blitz':key==='bullet'?'bullet':key==='puzzles'?'puzzle':null;
      if(!target||!Array.isArray(entry.points)) return;
      entry.points.forEach(point=>{
        if(!Array.isArray(point)||point.length<4) return;
        const [year,month,day,rating]=point;
        const dateKey=dk(new Date(year,month,day));
        history[target][dateKey]=rating;
      });
    });
    lcData.history=history;
    lcData.loading=false;
    lcData.lastFetch=Date.now();
    // Cache the rolling games window with only the fields the UI needs.
    const slimRecentGames=lcData.recentGames.map(g=>({id:g.id,players:g.players,winner:g.winner,speed:g.speed,perf:g.perf,lastMoveAt:g.lastMoveAt,createdAt:g.createdAt}));
    state.lcCache={username:user, profile:lcData.profile, todayGames:lcData.todayGames, recentGames:slimRecentGames, storm:lcData.storm, activity:lcData.activity, puzzleActivityByDay:lcData.puzzleActivityByDay, todayPuzzleCount:lcData.todayPuzzleCount, todayPuzzleWins:lcData.todayPuzzleWins, todayPuzzleLosses:lcData.todayPuzzleLosses, todayPuzzleDraws:lcData.todayPuzzleDraws, todayPuzzleRatingBefore:lcData.todayPuzzleRatingBefore, todayPuzzleRatingAfter:lcData.todayPuzzleRatingAfter, todayPuzzleRatingDelta:lcData.todayPuzzleRatingDelta, history:lcData.history, lastFetch:lcData.lastFetch, day:NOW()};
    syncLichessGamesToHistory('fetch');
    applyLichessPuzzleActivityToHistory(lcData.puzzleActivityByDay);
    persist();
    render();
  }).catch(err=>{
    if(!sameUser(user,getLCUser())) return;
    lcData.loading=false;
    lcData.error=err.message||'Failed to load';
    pushDebugLog('games','lichess_error',{error:lcData.error});
    render();
  });
}

function lcPlayerResult(g){
  const user=getLCUser().toLowerCase();
  const isWhite=g.players&&g.players.white&&g.players.white.user&&g.players.white.user.id===user;
  const me=isWhite?g.players.white:g.players.black;
  const opp=isWhite?g.players.black:g.players.white;
  let outcome='loss';
  if(g.winner==='white'&&isWhite) outcome='win';
  else if(g.winner==='black'&&!isWhite) outcome='win';
  else if(!g.winner) outcome='draw';
  return {outcome, me, opp, isWhite, speed:g.speed||'', perf:g.perf||''};
}
function lcGameDateKey(g){
  return dateKeyFromTimestamp((g&&g.lastMoveAt)!==undefined?g.lastMoveAt:(g&&g.createdAt));
}
function getLichessGameMs(game){
  return normalizeTimestampMs((game&&game.lastMoveAt)!==undefined?(game&&game.lastMoveAt):(game&&game.createdAt));
}
function getLichessGamesForDay(dayKey){
  const seen=new Set();
  return filterGamesForDisplayDay(dayKey,lcData.recentGames,function(game){
    return getLichessGameMs(game);
  }).filter(function(game){
    const key=(game&&game.id)||String(getLichessGameMs(game))+'_'+((game&&game.speed)||'')+'_'+((game&&game.perf)||'');
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}
function lichessTodayDisplayData(games){
  const list=Array.isArray(games)?games:[];
  const byType=gameTypeBreakdown();
  const items=list.map(function(g){
    const res=lcPlayerResult(g);
    const oppName=res.opp&&res.opp.user&&res.opp.user.name?res.opp.user.name:'?';
    const oppRating=res.opp&&res.opp.rating!==undefined?res.opp.rating:'?';
    const type=normalizeGameType(res.perf||res.speed);
    if(type) byType[type]+=1;
    return {
      colorDot:res.isWhite?'#fff':'#1e293b',
      colorBorder:'#94a3b8',
      colorTitle:res.isWhite?'White':'Black',
      resultColor:res.outcome==='win'?'#4ade80':res.outcome==='loss'?'#f87171':'#cbd5e1',
      resultLabel:res.outcome==='win'?'W':res.outcome==='loss'?'L':'D',
      opponent:oppName,
      opponentRating:String(oppRating),
      typeLabel:gameTypeLabel(type||res.speed),
      timeLabel:'',
    };
  });
  return {byType:byType,items:items};
}
function lichessRecentDisplayData(games){
  const list=Array.isArray(games)?games:[];
  const items=list.map(function(g){
    const res=lcPlayerResult(g);
    const oppName=res.opp&&res.opp.user&&res.opp.user.name?res.opp.user.name:'?';
    const oppRating=res.opp&&res.opp.rating!==undefined?res.opp.rating:'?';
    const type=normalizeGameType(res.perf||res.speed);
    return {
      colorDot:res.isWhite?'#fff':'#1e293b',
      colorBorder:'#94a3b8',
      colorTitle:res.isWhite?'White':'Black',
      resultColor:res.outcome==='win'?'#4ade80':res.outcome==='loss'?'#f87171':'#cbd5e1',
      resultLabel:res.outcome==='win'?'W':res.outcome==='loss'?'L':'D',

      typeLabel:gameTypeLabel(type||res.speed),
      timeLabel:'',
      dateLabel:fmtRecentGameDate((g&&g.lastMoveAt)!==undefined?g.lastMoveAt:(g&&g.createdAt))
    };
  });
  return {items:items};
}

function getLichessTrackedPuzzleCountForDay(dayKey){

}

function dominantTask(day){
  if(!day)return null;
  // First try: dominant by elapsed time
  let maxK=null,maxS=0;
  TK.forEach(k=>{const s=day.tasks[k].elapsedSeconds||0;if(s>maxS){maxS=s;maxK=k}});
  if(maxS>0) return{key:maxK,secs:maxS,total:TK.reduce((s,k)=>s+(day.tasks[k].elapsedSeconds||0),0)};
  // Fallback: dominant by count (for days where tasks completed without timers)
  let maxC=null,maxCv=0;
  TK.forEach(k=>{const c=day.tasks[k].count||0;if(c>maxCv){maxCv=c;maxC=k}});
  if(maxCv>0) return{key:maxC,secs:0,total:0};
  // Fallback: any task marked done
  for(const k of TK){if(day.tasks[k].done)return{key:k,secs:0,total:0}}
  return null;
}

      let bg;

    +renderRangeNav('month',false,!canNextMonth)
    +'</div>'
    +renderRangeSummaryCard('Total',fmtHoursLabel(monthSecs),'Active days',monthActiveDays,'Daily avg',fmtHoursLabel(monthAvg),monthActiveDays?('across '+monthActiveDays+' days'):'no active days')
    +'</div>';

  return h+'</div>';
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function applyButtonTooltips(){

  document.querySelectorAll('[data-tinc]').forEach(b=>b.title='Add one minute');
  document.querySelectorAll('[data-tdec]').forEach(b=>b.title='Remove one minute');
  document.querySelectorAll('[data-editcount]').forEach(b=>b.title='Edit the count directly');
  document.querySelectorAll('[data-edittime]').forEach(b=>b.title='Edit the recorded time manually');
  document.querySelectorAll('[data-plat]').forEach(b=>b.title='Track games on '+b.dataset.plat);
  document.querySelectorAll('[data-gtype]').forEach(b=>b.title='Set game type to '+b.dataset.gtype);
  document.querySelectorAll('[data-tactictool]').forEach(b=>b.title='Track tactics for '+b.dataset.tactictool);
  document.querySelectorAll('[data-rseries]').forEach(b=>b.title='Show or hide '+b.textContent.trim()+' on the rating chart');

    ccLoad:'Retry loading Chess.com data',

  };
  document.querySelectorAll('button,a').forEach(el=>{
    if(el.title) return;

    else if(text==='Retry') el.title='Try loading this data again';

// WIRE EVENTS (after render)

function wireEvents(dayData){
  // Day nav
  const prevBtn=document.getElementById('prevDay');
  const nextBtn=document.getElementById('nextDay');
  const todayBtn=document.getElementById('goToday');
  if(prevBtn)prevBtn.onclick=()=>{selectedDay=addD(selectedDay,-1);render()};
  if(nextBtn)nextBtn.onclick=()=>{selectedDay=addD(selectedDay,1);render()};
  if(todayBtn)todayBtn.onclick=()=>{selectedDay=NOW();render()};

  // Task buttons
  document.querySelectorAll('[data-start]').forEach(b=>b.onclick=()=>startTimer(selectedDay,b.dataset.start));
  document.querySelectorAll('[data-stop]').forEach(b=>b.onclick=()=>stopTimer(selectedDay,b.dataset.stop));
  document.querySelectorAll('[data-done]').forEach(b=>b.onclick=()=>markDone(selectedDay,b.dataset.done));
  document.querySelectorAll('[data-inc]').forEach(b=>bindHoldRepeat(b,()=>{const k=b.dataset.inc;setCount(selectedDay,k,getTaskDisplayCount(selectedDay,k,getDay(selectedDay))+1)}));
  document.querySelectorAll('[data-dec]').forEach(b=>bindHoldRepeat(b,()=>{const k=b.dataset.dec;setCount(selectedDay,k,getTaskDisplayCount(selectedDay,k,getDay(selectedDay))-1)}));
  document.querySelectorAll('[data-tinc]').forEach(b=>bindHoldRepeat(b,()=>{const k=b.dataset.tinc;adjustTaskTime(selectedDay,k,60)}));
  document.querySelectorAll('[data-tdec]').forEach(b=>bindHoldRepeat(b,()=>{const k=b.dataset.tdec;adjustTaskTime(selectedDay,k,-60)}));

  // Stepper direct edit
  document.querySelectorAll('[data-editcount]').forEach(b=>{
    b.onclick=()=>{
      const key=b.dataset.editcount;
      const inp=document.createElement('input');
      inp.className='stepper-edit';inp.type='text';inp.inputMode='numeric';
      inp.value=getTaskDisplayCount(selectedDay,key,getDay(selectedDay));
      b.replaceWith(inp);inp.focus();inp.select();
      const finish=()=>{const n=parseInt(inp.value,10);setCount(selectedDay,key,isNaN(n)?0:n)};
      inp.onblur=finish;inp.onkeydown=e=>{if(e.key==='Enter')finish()};
    };
  });

  // Edit time
  document.querySelectorAll('[data-edittime]').forEach(b=>{
    b.onclick=()=>{
      const key=b.dataset.edittime;
      const day=getDay(selectedDay);
      const totalSec=Math.floor(getTaskDisplayElapsedSeconds(selectedDay,key,day));
      const h=Math.floor(totalSec/3600), m=Math.floor((totalSec%3600)/60), s=totalSec%60;

      // Replace the timer display + edit btn with an inline editor
      const taskBtnsRow=b.closest('.metric-controls')||b.closest('.task-meta-row')||b.closest('.task-btns');
      if(!taskBtnsRow) return;

      // Remove old timer controls and edit button
      const timerStepperEl=taskBtnsRow.querySelector('.timer-stepper');
      if(timerStepperEl)timerStepperEl.remove();
      b.remove();

      // Create editor
      const editor=document.createElement('div');
      editor.className='time-editor';
      editor.innerHTML=
        '<input type="text" inputmode="numeric" class="time-editor-hours" id="te_h_'+key+'" value="'+h+'" maxlength="3" placeholder="h">'
        +'<span>:</span>'
        +'<input type="text" inputmode="numeric" id="te_m_'+key+'" value="'+String(m).padStart(2,'0')+'" maxlength="2" placeholder="m">'
        +'<span>:</span>'
        +'<input type="text" inputmode="numeric" id="te_s_'+key+'" value="'+String(s).padStart(2,'0')+'" maxlength="2" placeholder="s">'
        +'<div class="time-editor-btns">'
        +'<button class="btn btn-blue" id="te_save_'+key+'">Save</button>'
        +'<button class="btn btn-ghost" id="te_cancel_'+key+'" style="color:var(--text)">Cancel</button>'
        +'</div>';
      taskBtnsRow.appendChild(editor);

      // Focus the hours field first so longer edits are easy
      document.getElementById('te_h_'+key).focus();
      document.getElementById('te_h_'+key).select();

      // Auto-tab: when you type 2 digits, jump to next field
      ['te_h_'+key,'te_m_'+key,'te_s_'+key].forEach((id,i,arr)=>{
        const inp=document.getElementById(id);
        inp.oninput=()=>{
          inp.value=inp.value.replace(/[^0-9]/g,'');
          if(i>0 && inp.value.length>=2 && i<arr.length-1){
            document.getElementById(arr[i+1]).focus();
          }
        };
      });

      document.getElementById('te_save_'+key).onclick=()=>{
        const hh=parseInt(document.getElementById('te_h_'+key).value)||0;
        const mm=parseInt(document.getElementById('te_m_'+key).value)||0;
        const ss=parseInt(document.getElementById('te_s_'+key).value)||0;
        const newSec=Math.max(0,hh*3600+mm*60+ss);
        setTaskElapsedSeconds(selectedDay,key,newSec);
      };

      document.getElementById('te_cancel_'+key).onclick=()=>{render()};
    };
  });

  // Platform selector for games
  document.querySelectorAll('[data-plat]').forEach(b=>{
    b.onclick=()=>{const d=ensureDay(selectedDay);d.gamePlatform=b.dataset.plat;persist();render()};
  });
  document.querySelectorAll('[data-gtype]').forEach(b=>{
    b.onclick=()=>{const d=ensureDay(selectedDay);d.gameType=b.dataset.gtype;persist();render()};
  });
  document.querySelectorAll('[data-tactictool]').forEach(b=>{
    b.onclick=()=>{const d=ensureDay(selectedDay);d.tacticsPlatform=b.dataset.tactictool;persist();render()};
  });
  document.querySelectorAll('[data-rseries]').forEach(b=>{
    b.onclick=()=>{const key=b.dataset.rseries;state.ratingGraphFilters[key]=!state.ratingGraphFilters[key];persist();render()};
  });

  // Sliders
  document.querySelectorAll('[data-slider]').forEach(b=>{
    b.onclick=()=>{const d=ensureDay(selectedDay);d[b.dataset.slider]=parseInt(b.dataset.val);persist();render()};
  });

  // Text inputs
  const inpScore=document.getElementById('inpScore');
  const inpElo=document.getElementById('inpElo');
  const inpNotes=document.getElementById('inpNotes');
  if(inpScore)inpScore.oninput=()=>{ensureDay(selectedDay).dailyScore=inpScore.value;persist()};
  if(inpElo)inpElo.oninput=()=>{
    const day=ensureDay(selectedDay);
    const value=normalizeRatingValue(inpElo.value);
    const autoValue=getAutoGameRating(selectedDay,day);
    day.dailyElo=value;
    day.dailyEloManual=!!value&&value!==autoValue;
    persist();
  };
  if(inpNotes)inpNotes.oninput=()=>{ensureDay(selectedDay).notes=inpNotes.value;persist()};

  // Heatmap
  document.querySelectorAll('[data-hday]').forEach(c=>{
    if(c.dataset.hday)c.onclick=()=>{selectedDay=c.dataset.hday;render()};
  });

  // Last 7
  document.querySelectorAll('[data-day7]').forEach(b=>{b.onclick=()=>{selectedDay=b.dataset.day7;render()}});
  document.querySelectorAll('[data-rnav]').forEach(b=>{
    if(b.disabled) return;
    b.onclick=()=>{
      const [scope,dir]=b.dataset.rnav.split(':');
      if(scope==='last7'){
        const delta=dir==='prev'?-7:7;
        const nextEnd=addD(state.last7RangeEnd||NOW(),delta);
        state.last7RangeEnd=nextEnd>NOW()?NOW():nextEnd;
      }else if(scope==='week'){
        const delta=dir==='prev'?-7:7;
        const nextFocus=addD(state.weekFocusDay||NOW(),delta);
        state.weekFocusDay=startOfWeek(nextFocus)>startOfWeek(NOW())?NOW():nextFocus;
      }else if(scope==='month'){
        const delta=dir==='prev'?-1:1;
        const nextFocus=addMonths(state.monthFocusDay||NOW(),delta);
        state.monthFocusDay=startOfMonth(nextFocus)>startOfMonth(NOW())?NOW():nextFocus;
      }
      persist();
      render();
    };
  });

  // DnD
  document.querySelectorAll('.card[data-sec]').forEach(el=>{
    el.ondragstart=e=>{e.dataTransfer.setData('text/plain',el.dataset.idx);el.style.opacity='.5'};
    el.ondragend=()=>{el.style.opacity='1'};
    el.ondragover=e=>e.preventDefault();
    el.ondrop=e=>{
      e.preventDefault();
      const from=parseInt(e.dataTransfer.getData('text/plain'));
      const to=parseInt(el.dataset.idx);
      if(from===to)return;
      const arr=[...state.sectionOrder];const[rm]=arr.splice(from,1);arr.splice(to,0,rm);
      state.sectionOrder=arr;persist();render();
    };
  });

  // Chess.com
  const ccLoadBtn=document.getElementById('ccLoad');
  if(ccLoadBtn) ccLoadBtn.onclick=()=>ccFetch();
  const ccRefBtn=document.getElementById('ccRefresh');
  if(ccRefBtn) ccRefBtn.onclick=()=>ccFetch();
  const ccChangeBtn=document.getElementById('ccChangeUser');
  if(ccChangeBtn) ccChangeBtn.onclick=()=>{
    const newUser=prompt('Enter Chess.com username:',getCCUser());
    if(newUser&&newUser.trim()){
      setCCUser(newUser.trim());
      ccData=ccEmptyData();
      ccFetch();
    }
  };

  // Lichess
  const lcLoadBtn=document.getElementById('lcLoad');
  if(lcLoadBtn) lcLoadBtn.onclick=()=>lcFetch();
  const lcRefBtn=document.getElementById('lcRefresh');
  if(lcRefBtn) lcRefBtn.onclick=()=>lcFetch();
  const lcChangeBtn=document.getElementById('lcChangeUser');
  if(lcChangeBtn) lcChangeBtn.onclick=()=>{
    const newUser=prompt('Enter Lichess username:',getLCUser());
    if(newUser&&newUser.trim()){
      setLCUser(newUser.trim());
      lcData=lcEmptyData();
      lcFetch();
    }
  };

  // Chessiverse
  const cvChangeBtn=document.getElementById('cvChangeUser');
  if(cvChangeBtn) cvChangeBtn.onclick=()=>{
    const newUser=prompt('Enter Chessiverse username:',getCVUser());
    if(newUser&&newUser.trim()){setCVUser(newUser.trim());render()}
  };
  applyButtonTooltips();

  // Tooltips — heatmap cells
  ttBind('[data-ttday]', function(el){ return ttHeatmapHTML(el.dataset.ttday); });

  // Tooltips — Last 7 day buttons
  ttBind('[data-day7]', function(el){
    const dk=el.dataset.day7;
    const day=state.history[dk];
    const d=pd(dk);
    const dateStr=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    if(!day) return '<div class="tt-date">'+dateStr+'</div><div class="tt-detail">No activity</div>';
    const score=dScore(day);
    const totalMin=Math.round(tSecs(day)/60);
    let h='<div class="tt-date">'+dateStr+'</div>';
    h+='<div class="tt-detail">'+scoreText(score)+' tasks · '+totalMin+' min trained</div>';
    TK.forEach(function(k){
      const t=day.tasks[k];
      const sec=Math.round(t.elapsedSeconds||0);
      const cnt=t.count||0;
      const dn=isDone(k,t);
      if(sec>0||cnt>0||dn){
        const min=Math.round(sec/60);
        h+='<div class="tt-row">';
        h+='<div class="tt-dot" style="background:'+TASKS[k].color+'"></div>';
        h+='<span>'+TASKS[k].label+': ';
        const parts=[];
        if(cnt>0) parts.push(cnt+' '+TASKS[k].metric.toLowerCase());
        if(min>0) parts.push(min+'m');
        if(dn) parts.push('✓');
        h+=parts.join(' · ')+'</span></div>';
      }
    });
    return h;
  });

  // Banner stop
  document.getElementById('bannerStop').onclick=()=>{stopAllTimersEverywhere();render()};
}

// CHARTS (Chart.js)

function prepCanvas(canvas){
  const rect=canvas.getBoundingClientRect();
  const ratio=window.devicePixelRatio||1;
  const width=Math.max(280,Math.floor(rect.width||canvas.parentElement.clientWidth||520));
  const height=Math.max(160,Math.floor(rect.height||canvas.parentElement.clientHeight||200));
  canvas.width=Math.floor(width*ratio);
  canvas.height=Math.floor(height*ratio);
  const ctx=canvas.getContext('2d');
  ctx.setTransform(ratio,0,0,ratio,0,0);
  ctx.clearRect(0,0,width,height);
  return {ctx,width,height};
}
function drawFallbackMessage(canvas,message){
  if(!canvas) return;
  const area=prepCanvas(canvas);
  const ctx=area.ctx;
  ctx.fillStyle=state.isDark?'#94a3b8':'#64748b';
  ctx.font='13px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(message,area.width/2,area.height/2);
}
function chartNumericValues(datasets){
  const values=[];
  datasets.forEach(function(set){
    (set.data||[]).forEach(function(v){
      const n=Number(v);
      if(Number.isFinite(n)) values.push(n);
    });
  });
  return values;
}
function drawFallbackGrid(ctx,width,height,pad,tickColor,gridColor){
  ctx.strokeStyle=gridColor;
  ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pad.top+(height-pad.top-pad.bottom)*i/4;
    ctx.beginPath();
    ctx.moveTo(pad.left,y);
    ctx.lineTo(width-pad.right,y);
    ctx.stroke();
  }
  ctx.strokeStyle=tickColor;
  ctx.globalAlpha=.35;
  ctx.beginPath();
  ctx.moveTo(pad.left,pad.top);
  ctx.lineTo(pad.left,height-pad.bottom);
  ctx.lineTo(width-pad.right,height-pad.bottom);
  ctx.stroke();
  ctx.globalAlpha=1;
}
function drawFallbackLabels(ctx,labels,width,height,pad,tickColor){
  ctx.fillStyle=tickColor;
  ctx.font='11px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  const maxLabels=Math.min(6,labels.length);
  for(let i=0;i<maxLabels;i++){
    const idx=maxLabels===1?0:Math.round(i*(labels.length-1)/(maxLabels-1));
    const x=pad.left+(width-pad.left-pad.right)*(labels.length<=1?0.5:idx/(labels.length-1));
    ctx.fillText(labels[idx]||'',x,height-pad.bottom+8);
  }
}
function drawFallbackLineChart(canvas,labels,datasets,opts){
  if(!canvas) return;
  const visible=datasets.filter(function(set){return (set.data||[]).some(function(v){return Number.isFinite(Number(v))})});
  if(!visible.length){drawFallbackMessage(canvas,'No chart data yet');return}
  const area=prepCanvas(canvas);
  const ctx=area.ctx,width=area.width,height=area.height;
  const pad={left:42,right:16,top:18,bottom:34};
  const tickColor=state.isDark?'#94a3b8':'#64748b';
  const gridColor=state.isDark?'rgba(51,65,85,.6)':'rgba(203,213,225,.8)';
  const values=chartNumericValues(visible);
  let min=Math.min.apply(null,values),max=Math.max.apply(null,values);
  if(min===max){min=Math.max(0,min-1);max=max+1}
  const range=max-min;
  drawFallbackGrid(ctx,width,height,pad,tickColor,gridColor);
  ctx.fillStyle=tickColor;
  ctx.font='11px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif';
  ctx.textAlign='right';
  ctx.textBaseline='middle';
  for(let i=0;i<=4;i++){
    const value=max-range*i/4;
    const y=pad.top+(height-pad.top-pad.bottom)*i/4;
    const label=opts&&opts.formatY?opts.formatY(value):String(Math.round(value));
    ctx.fillText(label,pad.left-8,y);
  }
  drawFallbackLabels(ctx,labels,width,height,pad,tickColor);
  visible.forEach(function(set){
    ctx.strokeStyle=set.color||'#3b82f6';
    ctx.lineWidth=2;
    ctx.beginPath();
    let started=false;
    (set.data||[]).forEach(function(raw,idx){
      const value=Number(raw);
      if(!Number.isFinite(value)) return;
      const x=pad.left+(width-pad.left-pad.right)*(labels.length<=1?0.5:idx/(labels.length-1));
      const y=pad.top+(height-pad.top-pad.bottom)*(1-(value-min)/range);
      if(!started){ctx.moveTo(x,y);started=true}else{ctx.lineTo(x,y)}
    });
    ctx.stroke();
  });
  if((opts&&opts.legend)!==false&&visible.length>1){
    let x=pad.left,y=8;
    ctx.font='11px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif';
    ctx.textAlign='left';
    ctx.textBaseline='middle';
    visible.slice(0,4).forEach(function(set){
      ctx.fillStyle=set.color||'#3b82f6';
      ctx.fillRect(x,y,10,10);
      ctx.fillStyle=tickColor;
      ctx.fillText(set.label||'',x+14,y+5);
      x+=Math.min(150,ctx.measureText(set.label||'').width+34);
    });
  }
}
function drawFallbackBarChart(canvas,labels,datasets,opts){
  if(!canvas) return;
  const visible=datasets.filter(function(set){return (set.data||[]).some(function(v){return Number(v)>0})});
  if(!visible.length){drawFallbackMessage(canvas,'No chart data yet');return}
  const area=prepCanvas(canvas);
  const ctx=area.ctx,width=area.width,height=area.height;
  const pad={left:42,right:16,top:18,bottom:34};
  const tickColor=state.isDark?'#94a3b8':'#64748b';
  const gridColor=state.isDark?'rgba(51,65,85,.6)':'rgba(203,213,225,.8)';
  const stacked=opts&&opts.stacked;
  const totals=labels.map(function(_label,idx){
    return stacked?visible.reduce(function(sum,set){return sum+(Number(set.data[idx])||0)},0):Math.max.apply(null,visible.map(function(set){return Number(set.data[idx])||0}));
  });
  const max=Math.max(1,Math.max.apply(null,totals));
  drawFallbackGrid(ctx,width,height,pad,tickColor,gridColor);
  drawFallbackLabels(ctx,labels,width,height,pad,tickColor);
  const chartW=width-pad.left-pad.right;
  const chartH=height-pad.top-pad.bottom;
  const groupW=chartW/Math.max(1,labels.length);
  labels.forEach(function(_label,idx){
    if(stacked){
      let yBase=height-pad.bottom;
      visible.forEach(function(set){
        const value=Number(set.data[idx])||0;
        const barH=chartH*value/max;
        ctx.fillStyle=set.color||'#3b82f6';
        ctx.fillRect(pad.left+idx*groupW+groupW*.22,yBase-barH,Math.max(2,groupW*.56),barH);
        yBase-=barH;
      });
    }else{
      const barW=Math.max(2,groupW*.68/visible.length);
      visible.forEach(function(set,setIdx){
        const value=Number(set.data[idx])||0;
        const barH=chartH*value/max;
        const x=pad.left+idx*groupW+groupW*.16+setIdx*barW;
        ctx.fillStyle=set.color||'#3b82f6';
        ctx.fillRect(x,height-pad.bottom-barH,barW*.86,barH);
      });
    }
  });
}
function renderFallbackCharts(){
  const keys=Object.keys(state.history).sort().slice(-30);
  const labels=keys.map(k=>k.slice(5));
  const eloEl=document.getElementById('eloChart');
  if(eloEl){
    const cvHistoryMap={};
    Object.keys(state.history).forEach(key=>{
      const value=Number(state.history[key].dailyElo);
      if(Number.isFinite(value)) cvHistoryMap[key]=value;
    });
    Object.keys(state.cvHistory||{}).forEach(key=>{
      const value=state.cvHistory[key];
      if(typeof value==='number'&&Number.isFinite(value)) cvHistoryMap[key]=value;
    });
    const knownKeys=Array.from(new Set([

const BACKUP_STORAGE_KEYS=[SK,STANDALONE_STORAGE_KEY,'chess-trainer-v1',GAMES_APP_STORAGE_KEY];
function collectStandaloneBackup(){
  const storage={};
  BACKUP_STORAGE_KEYS.forEach(function(key){

    }catch(_err){}

    app:'chess-trainer-analysis',

    exportedAt:new Date().toISOString(),
    storage:storage
  };
}
function exportStandaloneBackup(){
  try{_doPersist()}catch(_err){}
  const data=JSON.stringify(collectStandaloneBackup(),null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const link=document.createElement('a');
  link.href=url;
  link.download='chess-trainer-backup-'+NOW()+'.json';
  link.style.display='none';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  setTimeout(function(){URL.revokeObjectURL(url)},1000);
}
function restoreStandaloneBackup(file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(){
    try{
      const parsed=JSON.parse(String(reader.result||'{}'));
      const storage=parsed&&parsed.storage&&typeof parsed.storage==='object'?parsed.storage:null;
      if(!storage) throw new Error('Missing backup data');
      BACKUP_STORAGE_KEYS.forEach(function(key){
        if(typeof storage[key]==='string') localStorage.setItem(key,storage[key]);
      });
      try{cloudMarkLocalChange({skipSchedule:true})}catch(_err){}
      window.location.reload();
    }catch(err){
      alert('That backup file could not be restored.');
    }
  };
  reader.readAsText(file);
}
