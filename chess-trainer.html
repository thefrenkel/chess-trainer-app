function cloudReadConfig(){
  const external=(typeof window!=='undefined'&&window.CHESS_TRAINER_FIREBASE_CONFIG&&typeof window.CHESS_TRAINER_FIREBASE_CONFIG==='object')
    ? window.CHESS_TRAINER_FIREBASE_CONFIG
    : {};
  return {...CLOUD_SYNC_CONFIG,...external};
}
function cloudConfigReady(config){
  config=config||cloudReadConfig();
  return !!(config.apiKey&&config.authDomain&&config.projectId&&config.appId);
}
function readCloudMeta(){
  try{
    const raw=localStorage.getItem(CLOUD_SYNC_META_KEY);
    return raw?JSON.parse(raw):{};
  }catch(_err){return {}}
}
function writeCloudMeta(meta){
  try{localStorage.setItem(CLOUD_SYNC_META_KEY,JSON.stringify(meta||{}))}catch(_err){}
}
function cloudSetStatus(status,message){
  cloudSyncState.status=status||cloudSyncState.status;
  cloudSyncState.message=message||cloudSyncState.message;
  renderCloudSyncStatus();
}
function renderCloudSyncStatus(){
  const pill=document.getElementById('cloudSyncStatus');
  const btn=document.getElementById('cloudSyncBtn');
  const signOutBtn=document.getElementById('cloudSignOutBtn');
  if(!pill||!btn) return;
  const configured=cloudConfigReady();
  const user=cloudSyncState.user;
  const busy=cloudSyncState.busy||cloudSyncState.initializing;
  let cls='sync-pill ';
  if(!configured) cls+='warn';
  else if(cloudSyncState.status==='error') cls+='err';
  else if(busy) cls+='busy';
  else if(user) cls+='ok';
  else cls+='warn';
  pill.className=cls;
  pill.textContent=busy?'Syncing...':(cloudSyncState.message||(!configured?'Cloud setup needed':(user?'Synced':'Local only')));
  pill.title=user&&user.email?('Cloud sync: '+user.email):'Cloud sync status';
  btn.textContent=!configured?'Setup Sync':(busy?'Syncing...':(user?'Sync now':'Sign in'));
  btn.disabled=busy;
  if(signOutBtn){
    signOutBtn.style.display=(configured&&user&&!busy)?'inline-flex':'none';
    signOutBtn.disabled=busy;
  }
}
function cloudShowSetupInstructions(){
  alert('Cloud sync is ready in the app, but Firebase is not configured yet. Create a Firebase project, enable Google sign-in and Firestore, then send me the Firebase web config object so I can add it here.');
}
function cloudFirebaseImports(){
  const base='https://www.gstatic.com/firebasejs/'+CLOUD_SYNC_SDK_VERSION;
  return Promise.all([
    import(base+'/firebase-app.js'),
    import(base+'/firebase-auth.js'),
    import(base+'/firebase-firestore.js')
  ]).then(function(mods){
    return {app:mods[0],auth:mods[1],firestore:mods[2]};
  });
}
async function cloudEnsureReady(){
  const config=cloudReadConfig();
  cloudSyncState.configured=cloudConfigReady(config);
  if(!cloudSyncState.configured){
    cloudSetStatus('setup','Cloud setup needed');
    return false;
  }
  if(cloudSyncState.ready) return true;
  if(cloudSyncState.initializing) return false;
  cloudSyncState.initializing=true;
  cloudSetStatus('busy','Starting sync...');
  try{
    const modules=await cloudFirebaseImports();
    const app=modules.app.getApps().length?modules.app.getApp():modules.app.initializeApp(config);
    const auth=modules.auth.getAuth(app);
    const db=modules.firestore.getFirestore(app);
    cloudSyncState.modules=modules;
    cloudSyncState.app=app;
    cloudSyncState.auth=auth;
    cloudSyncState.db=db;
    cloudSyncState.ready=true;
    modules.auth.onAuthStateChanged(auth,function(user){
      cloudSyncState.user=user||null;
      if(user){
        cloudSetStatus('ok','Signed in');
        cloudSyncNow('sign_in');
      }else{
        cloudSetStatus('idle','Local only');
      }
    });
    return true;
  }catch(err){
    console.error('[Chess Trainer] Cloud sync init failed',err);
    cloudSetStatus('error','Sync setup error');
    return false;
  }finally{
    cloudSyncState.initializing=false;
    renderCloudSyncStatus();
  }
}
function cloudUserDocRef(){
  const modules=cloudSyncState.modules;
  const user=cloudSyncState.user;
  if(!modules||!user) return null;
  return modules.firestore.doc(cloudSyncState.db,'users',user.uid,'apps','chess-trainer-analysis');
}
async function cloudSignIn(){
  if(!cloudConfigReady()){
    cloudShowSetupInstructions();
    return;
  }
  const ready=await cloudEnsureReady();
  if(!ready) return;
  try{
    cloudSyncState.busy=true;
    cloudSetStatus('busy','Signing in...');
    const provider=new cloudSyncState.modules.auth.GoogleAuthProvider();
    await cloudSyncState.modules.auth.signInWithPopup(cloudSyncState.auth,provider);
  }catch(err){
    console.error('[Chess Trainer] Google sign-in failed',err);
    cloudSetStatus('error','Sign-in failed');
    alert('Google sign-in did not finish. Check that Firebase Authentication is enabled and that thefrenkel.github.io is an authorized domain.');
  }finally{
    cloudSyncState.busy=false;
    renderCloudSyncStatus();
  }
}
async function cloudSignOut(){
  if(!cloudSyncState.auth||!cloudSyncState.modules) return;
  try{
    cloudSyncState.busy=true;
    cloudSetStatus('busy','Signing out...');
    await cloudSyncState.modules.auth.signOut(cloudSyncState.auth);
    cloudSetStatus('idle','Local only');
  }catch(err){
    console.error('[Chess Trainer] Cloud sign-out failed',err);
    cloudSetStatus('error','Sign-out failed');
  }finally{
    cloudSyncState.busy=false;
    renderCloudSyncStatus();
  }
}
function cloudMarkLocalChange(options){
  const meta=readCloudMeta();
  meta.localChangedAt=Date.now();
  meta.dirty=true;
  writeCloudMeta(meta);
  if(!(options&&options.skipSchedule)) cloudScheduleAutoPush();
}
function cloudScheduleAutoPush(){

  cloudSyncPushTimer=setTimeout(function(){

}

function cloudBestDashboardFromBackup(backup){
  const storage=backup&&backup.storage&&typeof backup.storage==='object'?backup.storage:{};
  let best=null,bestScore=-1;
  [SK,STANDALONE_STORAGE_KEY,'chess-trainer-v1'].forEach(function(key){
    const parsed=cloudParseJson(storage[key]);
    const score=stateRecoveryScore(parsed);
    if(score>bestScore){
      best=parsed;
      bestScore=score;
    }
  });
  return best;
}
function cloudGamesFromBackup(backup,dashboard){
  const storage=backup&&backup.storage&&typeof backup.storage==='object'?backup.storage:{};
  const direct=cloudParseJson(storage[GAMES_APP_STORAGE_KEY]);
  if(direct&&typeof direct==='object') return direct;
  const bridge=dashboard&&dashboard.gameAnalysis&&typeof dashboard.gameAnalysis==='object'?dashboard.gameAnalysis:null;
  if(!bridge) return null;
  return {
    settings:bridge.settings||{},
    books:bridge.books||{white:null,black:null},
    games:Array.isArray(bridge.games)?bridge.games:[],
    lastSyncedAt:Number(bridge.syncedAt)||null,
    lastSyncError:null
  };
}
function cloudClone(value){
  try{return JSON.parse(JSON.stringify(value))}catch(_err){return value}
}
function cloudMergeDashboardStates(localDashboard,remoteDashboard){
  const merged=cloudClone(localDashboard||remoteDashboard||{history:{}});
  if(!merged.history||typeof merged.history!=='object') merged.history={};
  if(remoteDashboard) mergeRecoverySnapshot(merged,cloudClone(remoteDashboard));
  if(localDashboard) mergeRecoverySnapshot(merged,cloudClone(localDashboard));
  return merged;
}
function cloudMergeGames(localGamesState,remoteGamesState){
  if(!localGamesState&&!remoteGamesState) return null;
  const local=localGamesState&&typeof localGamesState==='object'?localGamesState:{};
  const remote=remoteGamesState&&typeof remoteGamesState==='object'?remoteGamesState:{};
  const byId={};
  function gameScore(game){
    if(!game||typeof game!=='object') return 0;
    const reviewAt=Number(game.review&&game.review.updatedAt)||0;
    let size=0;
    try{size=JSON.stringify(game).length}catch(_err){}
    return reviewAt+size;
  }
  function push(game){
    if(!game||!game.id) return;
    const id=String(game.id);
    if(!byId[id]||gameScore(game)>gameScore(byId[id])) byId[id]=game;
  }
  (Array.isArray(remote.games)?remote.games:[]).forEach(push);
  (Array.isArray(local.games)?local.games:[]).forEach(push);
  const mergedBooks={white:null,black:null,...(remote.books||{}),...(local.books||{})};
  ['white','black'].forEach(function(color){
    if(!mergedBooks[color]&&remote.books&&remote.books[color]) mergedBooks[color]=remote.books[color];
  });
  return {
    settings:{...(remote.settings||{}),...(local.settings||{})},
    books:mergedBooks,
    games:Object.keys(byId).map(function(id){return byId[id]}).sort(function(a,b){return (Number(b&&b.playedAt)||0)-(Number(a&&a.playedAt)||0)}),
    lastSyncedAt:Math.max(Number(local.lastSyncedAt)||0,Number(remote.lastSyncedAt)||0)||null,
    lastSyncError:local.lastSyncError||remote.lastSyncError||null
  };
}
function cloudMergeBackups(localBackup,remoteBackup){
  const localDashboard=cloudBestDashboardFromBackup(localBackup);
  const remoteDashboard=cloudBestDashboardFromBackup(remoteBackup);
  const mergedDashboard=cloudMergeDashboardStates(localDashboard,remoteDashboard);
  const mergedGames=cloudMergeGames(
    cloudGamesFromBackup(localBackup,localDashboard),
    cloudGamesFromBackup(remoteBackup,remoteDashboard)
  );
  const storage={};
  storage[SK]=JSON.stringify(mergedDashboard||{history:{}});
  if(mergedGames) storage[GAMES_APP_STORAGE_KEY]=JSON.stringify(mergedGames);
  return {
    app:'chess-trainer-analysis',
    version:APP_VERSION,
    exportedAt:new Date().toISOString(),
    storage:storage
  };
}
function cloudApplyBackupLocally(backup,cloudUpdatedAt){
  const storage=backup&&backup.storage&&typeof backup.storage==='object'?backup.storage:{};
  const dashboardRaw=typeof storage[SK]==='string'?storage[SK]:(typeof storage[STANDALONE_STORAGE_KEY]==='string'?storage[STANDALONE_STORAGE_KEY]:storage['chess-trainer-v1']);
  if(dashboardRaw){
    [SK,STANDALONE_STORAGE_KEY,'chess-trainer-v1'].forEach(function(key){
      try{localStorage.setItem(key,dashboardRaw)}catch(_err){}
    });
  }
  if(typeof storage[GAMES_APP_STORAGE_KEY]==='string'){
    try{localStorage.setItem(GAMES_APP_STORAGE_KEY,storage[GAMES_APP_STORAGE_KEY])}catch(_err){}
  }
  const meta=readCloudMeta();
  meta.cloudUpdatedAt=Number(cloudUpdatedAt)||Date.now();
  meta.lastPulledAt=Date.now();
  meta.localChangedAt=0;
  meta.dirty=false;
  writeCloudMeta(meta);
}
async function cloudWriteBackup(backup,reason){
  const ref=cloudUserDocRef();
  if(!ref) throw new Error('Not signed in');
  const updatedAt=Date.now();
  await cloudSyncState.modules.firestore.setDoc(ref,{
    app:'chess-trainer-analysis',
    version:APP_VERSION,
    updatedAt:updatedAt,
    updatedAtIso:new Date(updatedAt).toISOString(),
    reason:reason||'manual',
    writer:{
      uid:cloudSyncState.user.uid,
      email:cloudSyncState.user.email||''
    },
    backup:backup
  },{merge:true});
  const meta=readCloudMeta();
  meta.cloudUpdatedAt=updatedAt;
  meta.lastPushedAt=Date.now();
  meta.localChangedAt=0;
  meta.dirty=false;
  writeCloudMeta(meta);
  return updatedAt;
}
async function cloudSyncNow(reason){
  if(!cloudConfigReady()){
    cloudShowSetupInstructions();
    renderCloudSyncStatus();
    return;
  }
  const ready=await cloudEnsureReady();
  if(!ready) return;
  if(!cloudSyncState.user){
    await cloudSignIn();
    return;
  }
  if(cloudSyncState.busy&&reason!=='sign_in') return;
  cloudSyncState.busy=true;
  cloudSetStatus('busy','Syncing...');
  try{
    const ref=cloudUserDocRef();
    const localBackup=cloudCompactBackup();
    const snap=await cloudSyncState.modules.firestore.getDoc(ref);
    const remote=snap.exists()?snap.data():null;
    const meta=readCloudMeta();
    if(!remote||!remote.backup){
      await cloudWriteBackup(localBackup,reason||'first_sync');
      cloudSetStatus('ok','Synced');
      return;
    }
    const remoteUpdatedAt=Number(remote.updatedAt)||0;
    const knownCloudUpdatedAt=Number(meta.cloudUpdatedAt)||0;
    const localChangedAt=Number(meta.localChangedAt)||0;
    const localDirty=!!meta.dirty||localChangedAt>knownCloudUpdatedAt;
    if(!localDirty&&remoteUpdatedAt<=knownCloudUpdatedAt){
      cloudSetStatus('ok','Synced');
      return;
    }
    if(localDirty&&remoteUpdatedAt<=knownCloudUpdatedAt){
      await cloudWriteBackup(localBackup,reason||'local_changes');
      cloudSetStatus('ok','Synced');
      return;
    }
    const mergedBackup=cloudMergeBackups(localBackup,remote.backup);
    const newUpdatedAt=await cloudWriteBackup(mergedBackup,reason||'merge');
    cloudApplyBackupLocally(mergedBackup,newUpdatedAt);
    cloudSetStatus('ok','Synced');
    window.location.reload();
  }catch(err){
    console.error('[Chess Trainer] Cloud sync failed',err);
    cloudSetStatus('error','Sync failed');
    alert('Cloud sync failed. If you just created Firebase, check Firestore rules, Google sign-in, and the authorized domain.');
  }finally{
    cloudSyncState.busy=false;
    renderCloudSyncStatus();
  }
}
function cloudInitOnLoad(){
  renderCloudSyncStatus();
  if(cloudConfigReady()) cloudEnsureReady();
}

// ═══════════════════════════════════════════════════════════
// CHESSABLE AUTO-TRACKER DASHBOARD BRIDGE
// ═══════════════════════════════════════════════════════════
(function dashboardBridge(){
  function refreshDashboardStateFromStorage(){
    try{
      var freshState=readSavedDashboardState();
      if(!freshState||typeof freshState!=='object'||!freshState.history) return false;
      var cleanupBefore=dashboardDataCleanupApplied;
      state=freshState;
      Object.keys(state.history).forEach(function(key){
        state.history[key]=safeNormalizeDay(key,state.history[key]);
      });
      if(!state.sectionOrder) state.sectionOrder=[...SECS];
      if(!state.last7RangeEnd||state.last7RangeEnd<NOW()) state.last7RangeEnd=NOW();
      if(!state.weekFocusDay) state.weekFocusDay=NOW();
      if(!state.monthFocusDay) state.monthFocusDay=NOW();
      state.ratingGraphFilters={cv:true,ccRapid:true,ccBlitz:false,ccBullet:false,lcRapid:false,lcBlitz:false,lcBullet:false,lcPuzzle:false,...(state.ratingGraphFilters||{})};
      var todayState=state.history[NOW()];
      if(todayState&&clearLegacyChessComPuzzleRushAutoSync(todayState)) persist();
      if(dashboardDataCleanupApplied!==cleanupBefore) persist();
      return true;
    }catch(err){
      console.warn('[Chess Trainer] Failed to refresh dashboard state from tracker storage update', err);
      return false;
    }
  }

  // Expose render for companion scripts without re-reading storage on every UI refresh.
  window.render = render;
  window.addEventListener('chess-tracker-sync-applied', function(){
    if(refreshDashboardStateFromStorage()) render();
  });

  // Check if the extension injected updated cvCache via executeScript
  function checkCVCache(){
    try{
      var freshState=JSON.parse(localStorage.getItem(SK)||'{}');
      if(freshState.cvCache && freshState.cvCache.lastFetch && freshState.cvCache.lastFetch>(cvData.lastFetch||0)){
        Object.keys(cvData).forEach(function(k){if(freshState.cvCache[k]!==undefined)cvData[k]=freshState.cvCache[k]});
        applyChessiverseSyncToToday();
        cvSaveCache();
        render();
        return true;
      }
    }catch(e){}
    return false;
  }
  checkCVCache();
  // Poll for extension-injected data every 3s for the first 30s
  var cvPollCount=0;
  var cvPollTimer=setInterval(function(){
    cvPollCount++;
    if(cvPollCount>10||checkCVCache()){clearInterval(cvPollTimer)}
  },3000);

  // Listen for sync messages from the extensions
  window.addEventListener('message', function(event){
    // Chessiverse sync from extension content script
    if(event.data && event.data.type === 'CHESSIVERSE_SYNC'){
      var d=event.data.payload;
      if(!d) return;
      cvData=cvMergeData(cvData,d);
      cvData.lastFetch=Date.now();
      applyChessiverseSyncToToday();
      cvSaveCache();render();
      window.postMessage({type:'CHESSIVERSE_SYNC_ACK',success:true},'*');
      return;
    }
    if(!event.data || event.data.type !== 'CHESSABLE_TRACKER_SYNC') return;
    var sync = event.data.payload;
    if(!sync || !sync.taskKey || !sync.dateKey) return;
    try {
      var trackedDay = ensureDay(sync.dateKey);
      var originalTaskKey=sync.taskKey;
      sync.taskKey=normalizeChessableSyncTaskKey(sync.taskKey,sync.source,sync.courseName)||sync.taskKey;
      var receivedAt=Date.now();
      var storedSession=upsertStoredTrackerSession(trackedDay,{
        syncId:sync.syncId,
        activityKey:sync.activityKey,
        sessionId:sync.sessionId,
        sessionCount:sync.sessionCount,
        mode:originalTaskKey,
        source:sync.source,
        courseName:sync.courseName,
        chapterName:sync.chapterName,
        lineName:sync.lineName,
        confidence:sync.confidence,
        openingSide:sync.openingSide,
        accuracy:sync.accuracy,
        completionAccuracy:sync.completionAccuracy,
        timestamp:Number(sync.timestamp)||receivedAt,
        addCount:Number(sync.addCount)||0,
        addSeconds:Number(sync.addSeconds)||0
      },originalTaskKey);
      var storedSessionId=storedSession&&storedSession.normalized?storedSession.normalized.id:'';
      if(storedSessionId&&trackerAppliedSessionIds(trackedDay).indexOf(storedSessionId)!==-1){
        persist();
        render();
        window.postMessage({type:'CHESSABLE_TRACKER_SYNC_ACK', success:true, duplicate:true}, '*');
        return;
      }
      var resolvedOpeningCourseName=sync.taskKey==='openings'
        ? resolveOpeningCourseNameForSync(trackedDay, sync.courseName, state.lastOpeningCourseName)
        : '';
      var resolvedTacticsCourseName=sync.taskKey==='tactics'&&sync.source==='chessable'
        ? (cleanTacticsCourseName(sync.courseName)||'')
        : (sync.courseName||'');
      var syncMeta={
        taskKey:sync.taskKey,
        dateKey:sync.dateKey,
        source:sync.source||null,
        courseName:sync.taskKey==='openings'?(resolvedOpeningCourseName||''):resolvedTacticsCourseName,
        addCount:Number(sync.addCount)||0,
        addSeconds:Number(sync.addSeconds)||0,
        openingSide:sync.openingSide||null,
        accuracy:normalizeAccuracy(sync.accuracy),
        receivedAt:receivedAt
      };
      trackedDay.started = true;
      trackedDay.lastTrackerSync = syncMeta;
      state.lastTrackerSync = syncMeta;
      pushTrackerSyncAudit(trackedDay,{
        receivedAt:receivedAt,
        source:sync.source||'chessable',
        originalTaskKey:originalTaskKey,
        appliedTaskKey:sync.taskKey,
        courseName:syncMeta.courseName||sync.courseName||'',
        addCount:syncMeta.addCount,
        addSeconds:syncMeta.addSeconds
      });
      var task = trackedDay.tasks[sync.taskKey];
      if(!task){
        trackedDay.tasks[sync.taskKey] = eTask();
        task = trackedDay.tasks[sync.taskKey];
      }
      if(storedSession&&storedSession.stored) task.lastSessionMeta=storedSession.stored;
      // Additive merge: add seconds and count
      task.elapsedSeconds = (task.elapsedSeconds || 0) + (sync.addSeconds || 0);
      task.count = (task.count || 0) + (sync.addCount || 0);
      if(sync.taskKey === 'openings'){
        if(resolvedOpeningCourseName){
          sync.courseName = resolvedOpeningCourseName;
          trackedDay.lastOpeningCourseName = resolvedOpeningCourseName;
          state.lastOpeningCourseName = resolvedOpeningCourseName;
        }
        if(!trackedDay.openingBreakdown){
          trackedDay.openingBreakdown = eOpeningBreakdown();
        }
        var openingSide = sync.openingSide === 'white' || sync.openingSide === 'black' ? sync.openingSide : null;
        if(openingSide){
          trackedDay.openingSides[openingSide] = true;
          var sideStats = trackedDay.openingBreakdown[openingSide];
          sideStats.elapsedSeconds = (sideStats.elapsedSeconds || 0) + (sync.addSeconds || 0);
          sideStats.count = (sideStats.count || 0) + (sync.addCount || 0);
        }
        applyOpeningCourseSync(trackedDay, sync);
      }
      if(sync.taskKey === 'tactics'){
        if(!trackedDay.tacticsBreakdown){
          trackedDay.tacticsBreakdown = eTacticsBreakdown();
        }
        var tacticSource = TACTIC_TOOLS[sync.source] ? sync.source : 'chessable';
        if(tacticSource==='chessable' && resolvedTacticsCourseName){
          sync.courseName = resolvedTacticsCourseName;
          applyTacticsCourseSync(trackedDay, sync);
        }
        trackedDay.tacticsPlatform = tacticSource;
        trackedDay.tacticsBreakdown[tacticSource].elapsedSeconds = (trackedDay.tacticsBreakdown[tacticSource].elapsedSeconds || 0) + (sync.addSeconds || 0);
        trackedDay.tacticsBreakdown[tacticSource].count = (trackedDay.tacticsBreakdown[tacticSource].count || 0) + (sync.addCount || 0);
        syncTacticsTotals(trackedDay);
        if(sync.source==='lichess'&&sync.dateKey===NOW()){
          lcData.todayPuzzleCount=Math.max(lcData.todayPuzzleCount||0,trackedDay.tacticsBreakdown.lichess.count||0);
          if(state.lcCache){
            state.lcCache.todayPuzzleCount=Math.max(state.lcCache.todayPuzzleCount||0,trackedDay.tacticsBreakdown.lichess.count||0);
            state.lcCache.day=NOW();
          }
          lcScheduleTrackedRefresh();
        }
      }
      task.timerRunning = false;
      task.timerStartedAt = null;
      if(storedSessionId){
        var appliedIds=trackerAppliedSessionIds(trackedDay);
        if(appliedIds.indexOf(storedSessionId)===-1){
          appliedIds.push(storedSessionId);
          setTrackerAppliedSessionIds(trackedDay,appliedIds);
        }
      }
      persist();
      render();
      // Acknowledge
      window.postMessage({type:'CHESSABLE_TRACKER_SYNC_ACK', success:true}, '*');
    } catch(e) {
      console.error('[Dashboard Bridge] Sync error:', e);
      window.postMessage({type:'CHESSABLE_TRACKER_SYNC_ACK', success:false, error:e.message}, '*');
    }
  });
})();
</script>
